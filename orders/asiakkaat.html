<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asiakkaat — Okkosen Puutuote</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #1c1a14;
    --panel: #2a2720;
    --border: #4a4535;
    --accent: #d97706;
    --accent-dim: #b45309;
    --accent-glow: rgba(217,119,6,0.15);
    --text: #ededf0;
    --text-dim: #9595a0;
    --input-bg: #333028;
    --success: #3dba6e;
    --danger: #e84040;
    --warn: #e8a020;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: #141210;
    border-bottom: 2px solid var(--accent);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 16px; font-weight: 500; color: var(--text); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* LAYOUT */
  .main {
    display: grid;
    grid-template-columns: var(--sidebar-width, 340px) 1fr;
    height: calc(100vh - 62px);
  }
  .left-panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex; flex-direction: column;
    position: relative;
  }
  .sidebar-resizer {
    position: absolute; top: 0; right: 0; width: 5px; height: 100%;
    cursor: col-resize; z-index: 10; background: transparent;
  }
  .sidebar-resizer:hover, .sidebar-resizer.dragging { background: var(--accent); opacity: 0.5; }
  .right-panel { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  /* SEARCH BAR */
  .search-bar {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
    background: #201e16;
  }
  .search-bar input {
    flex: 1; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; padding: 7px 10px; border-radius: 4px;
  }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-dim); }

  /* ASIAKASLISTA */
  .customer-list { flex: 1; overflow-y: auto; }
  .customer-item {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
    transition: background 0.1s;
  }
  .customer-item:hover { background: var(--accent-glow); }
  .customer-item.active {
    background: var(--accent-glow);
    border-left: 3px solid var(--accent);
    padding-left: 13px;
  }
  .customer-item.inactive { opacity: 0.45; }
  .customer-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .customer-meta { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
  .customer-num { font-size: 10px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-weight: 600; }

  /* LISTA-FOOTER */
  .list-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: #201e16;
    display: flex; gap: 8px;
  }

  /* SECTIONS */
  .section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }
  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ASIAKAS-KORTTI */
  .customer-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: #222018;
    border-radius: 6px 6px 0 0;
  }
  .card-header h2 { font-size: 18px; font-weight: 600; color: var(--text); flex: 1; }
  .customer-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    border-radius: 3px;
    padding: 2px 8px;
  }
  .inactive-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--danger);
    background: rgba(232,64,64,0.1);
    border: 1px solid var(--danger);
    border-radius: 3px; padding: 2px 8px;
  }
  .card-body { padding: 20px; }

  /* NAV MENU */
  .nav-menu-wrap { position: relative; }
  .nav-btn {
    background: #3a3545; border: 1px solid #585568;
    color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; letter-spacing: 0.04em;
  }
  .nav-btn:hover { background: #4a4558; }
  .nav-dropdown {
    display: none; position: absolute; top: calc(100% + 6px); left: 0;
    background: #3a3545; border: 1px solid var(--border);
    border-radius: 6px; min-width: 200px; z-index: 999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); overflow: hidden;
  }
  .nav-dropdown.open { display: block; }
  .nav-section-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); padding: 8px 14px 4px;
  }
  .nav-item {
    display: block; width: 100%; text-align: left;
    padding: 8px 14px; font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--text); background: none;
    border: none; cursor: pointer; text-decoration: none;
    transition: background 0.1s;
  }
  .nav-item:hover { background: var(--accent-glow); color: var(--accent); }
  .nav-item.current { color: var(--accent); font-weight: 600; }
  .nav-item.external::after { content: ' ↗'; opacity: 0.6; font-size: 11px; }
  .nav-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  /* FILTER TABS */
  .filter-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: #201e16;
  }
  .filter-tab {
    flex: 1; padding: 7px 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600;
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; letter-spacing: 0.04em;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* GRID KENTÄT */
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
  .field-grid.cols4 { grid-template-columns: 2fr 1fr 2fr 1fr; }
  .field-grid.cols4-addr { grid-template-columns: 3fr 1fr 2fr 1fr; }
  .field-grid.cols4-contact { grid-template-columns: 1fr 2fr 2fr 2fr; }
  .field-grid.wide { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field.full { grid-column: 1 / -1; }
  label {
    font-size: 11px; color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }
  input, select, textarea {
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 14px; padding: 7px 9px; border-radius: 4px; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  input[readonly] {
    color: var(--text); cursor: default;
    border-color: transparent; background: transparent; padding-left: 0;
    font-size: 15px;
  }
  textarea { resize: vertical; min-height: 60px; }
  select option { background: var(--panel); }

  /* MOBIILI */
  .mobile-back {
    display: none; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: #201e16;
  }
  .mobile-back button {
    background: none; border: none; color: var(--accent);
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; cursor: pointer; padding: 0;
  }
  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr !important; }
    .left-panel { height: calc(100vh - 62px); border-right: none; }
    .right-panel { display: none; position: fixed; top: 62px; left: 0; right: 0; bottom: 0;
      background: var(--bg); z-index: 100; overflow-y: auto; padding: 0; }
    .right-panel.mobile-open { display: flex; }
    .mobile-back { display: block; }
    .field-grid.cols4, .field-grid.cols4-addr,
    .field-grid.cols4-contact { grid-template-columns: 1fr 1fr; }
    .card-header { flex-wrap: wrap; gap: 8px; }
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* NAPIT */
  .btn {
    padding: 8px 14px; border: none; border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.04em;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #686578; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #ff5555; }
  .btn-warn { background: var(--warn); color: #1a1a1a; }
  .btn-warn:hover { background: #f0b030; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .row { display: flex; gap: 8px; align-items: center; }

  /* TILAUSHISTORIA */
  .order-row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .order-row:last-child { border-bottom: none; }
  .order-row:hover { background: var(--accent-glow); cursor: pointer; }
  .copy-order-btn {
    margin-left: auto; background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; padding: 2px 7px; border-radius: 3px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }
  .copy-order-btn:hover { border-color: var(--accent); color: var(--accent); }
  .order-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); min-width: 90px; }
  .order-desc { flex: 1; color: var(--text); }
  .order-kohde { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); min-width: 80px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .order-status {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 3px;
  }
  .status-draft { background: #44444f; color: var(--text-dim); }
  .status-active { background: #1e3d2e; color: var(--success); }
  .status-done { background: #1e2d3d; color: #5aabee; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 48px 20px;
    color: var(--text-dim); font-size: 13px;
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }

  /* SAVING INDICATOR */
  .saving { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
  .saving.ok { color: var(--success); }
  .saving.err { color: var(--danger); }
</style>
</head>

async function supabaseGet(table, params = '') {
  const { data: { session } } = await window._supabaseClient.auth.getSession();
  const token = session ? session.access_token : SUPABASE_KEY;
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  return r.json();
}

async function supabasePost(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json', Prefer: 'return=representation'
    },
    body: JSON.stringify(data)
  });
  return r.json();
}

async function supabasePatch(table, id, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json', Prefer: 'return=representation'
    },
    body: JSON.stringify(data)
  });
  return r.json();
}

async function loadCustomers() {
  const data = await supabaseGet('customers', '?select=*&order=name.asc');
  customers = Array.isArray(data) ? data : [];
  filterCustomers(document.getElementById('searchInput').value);
}

function filterCustomers(q) {
  const ql = (q || '').toLowerCase();
  filteredCustomers = customers.filter(c => {
    if (activeFilter === 'active' && !c.is_active) return false;
    if (activeFilter === 'archived' && c.is_active) return false;
    if (!ql) return true;
    return (c.name || '').toLowerCase().includes(ql)
      || (c.customer_number || '').toLowerCase().includes(ql)
      || (c.contact_person || '').toLowerCase().includes(ql)
      || (c.phone || '').toLowerCase().includes(ql);
  });
  renderList();
}

function renderList() {
  const el = document.getElementById('customerList');
  const count = document.getElementById('listCount');
  count.textContent = `${filteredCustomers.length} kpl`;
  if (!filteredCustomers.length) {
    el.innerHTML = '<div class="empty-state" style="padding:32px;">Ei asiakkaita</div>';
    return;
  }
  el.innerHTML = filteredCustomers.map(c => `
    <div class="customer-item ${!c.is_active ? 'inactive' : ''} ${activeCustomer?.id === c.id ? 'active' : ''}"
         onclick="selectCustomer('${c.id}')">
      <div class="customer-name">${c.name || '—'}</div>
      <div style="display:flex;gap:8px;align-items:center;">
        ${c.customer_number ? `<span class="customer-num">#${c.customer_number}</span>` : ''}
        ${c.contact_person ? `<span class="customer-meta">${c.contact_person}</span>` : ''}
      </div>
      ${c.phone || c.email ? `<div class="customer-meta">${[c.phone, c.email].filter(Boolean).join(' · ')}</div>` : ''}
    </div>
  `).join('');
}

// =============================================
// VALINTA
// =============================================
function selectCustomer(id) {
  if (isDirty && !confirm('Tallentamattomat muutokset häviävät. Jatketaanko?')) return;
  activeCustomer = customers.find(c => c.id === id);
  isDirty = false;
  isEditMode = false;
  renderList();
  showCustomer();
  loadOrders(id);
  document.getElementById('rightPanel').classList.add('mobile-open');
}

function mobileBack() {
  document.getElementById('rightPanel').classList.remove('mobile-open');
}

function showCustomer() {
  const c = activeCustomer;
  if (!c) return;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('newCustomerForm').style.display = 'none';
  document.getElementById('customerCard').style.display = 'block';

  document.getElementById('cardName').textContent = c.name || '—';
  document.getElementById('cardNumber').textContent = c.customer_number ? `#${c.customer_number}` : '';
  document.getElementById('cardInactiveBadge').style.display = c.is_active ? 'none' : '';
  document.getElementById('archiveBtn').textContent = c.is_active ? 'Arkistoi' : 'Palauta';
  document.getElementById('archiveBtn').className = c.is_active ? 'btn btn-danger btn-sm' : 'btn btn-warn btn-sm';

  setFields(c);
  setReadonly(!isEditMode);
  document.getElementById('editActions').style.display = 'none';
}

function setFields(c) {
  const m = {
    f_name: c.name, f_customer_number: c.customer_number,
    f_contact_person: c.contact_person, f_business_id: c.business_id,
    f_billing_address: c.billing_address, f_billing_postal_code: c.billing_postal_code,
    f_billing_city: c.billing_city, f_billing_country: c.billing_country || 'Suomi',
    f_phone: c.phone, f_email: c.email, f_email2: c.email2,
    f_ovt_number: c.ovt_number, f_notes: c.notes
  };
  for (const [id, val] of Object.entries(m)) {
    const el = document.getElementById(id);
    if (el) el.value = val || '';
  }
}

function setReadonly(ro) {
  ['f_name','f_customer_number','f_contact_person','f_business_id',
   'f_billing_address','f_billing_postal_code','f_billing_city','f_billing_country',
   'f_phone','f_email','f_email2','f_ovt_number','f_notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.readOnly = ro;
  });
}

// =============================================
// MUOKKAUS
// =============================================
function toggleEdit() {
  isEditMode = !isEditMode;
  setReadonly(!isEditMode);
  document.getElementById('editToggleBtn').textContent = isEditMode ? '✕ Peruuta muokkaus' : '✎ Muokkaa';
  document.getElementById('editActions').style.display = isEditMode ? 'flex' : 'none';
  if (isEditMode) document.getElementById('f_name').focus();
}

function cancelEdit() {
  isEditMode = false;
  isDirty = false;
  setFields(activeCustomer);
  setReadonly(true);
  document.getElementById('editToggleBtn').textContent = '✎ Muokkaa';
  document.getElementById('editActions').style.display = 'none';
  document.getElementById('cardSaveStatus').textContent = '';
}

function markDirty() { isDirty = true; }

async function saveCustomer() {
  const el = document.getElementById('cardSaveStatus');
  el.className = 'saving'; el.textContent = 'Tallennetaan...';
  const data = {
    name: document.getElementById('f_name').value.trim().toUpperCase(),
    customer_number: document.getElementById('f_customer_number').value.trim() || null,
    contact_person: document.getElementById('f_contact_person').value.trim() || null,
    business_id: document.getElementById('f_business_id').value.trim() || null,
    billing_address: (document.getElementById('f_billing_address').value.trim() || '').toUpperCase() || null,
    billing_postal_code: document.getElementById('f_billing_postal_code').value.trim() || null,
    billing_city: (document.getElementById('f_billing_city').value.trim() || '').toUpperCase() || null,
    billing_country: document.getElementById('f_billing_country').value.trim() || null,
    phone: document.getElementById('f_phone').value.trim() || null,
    email: document.getElementById('f_email').value.trim() || null,
    email2: document.getElementById('f_email2').value.trim() || null,
    ovt_number: document.getElementById('f_ovt_number').value.trim() || null,
    notes: document.getElementById('f_notes').value.trim() || null,
  };
  if (!data.name) { el.className = 'saving err'; el.textContent = 'Nimi puuttuu!'; return; }
  try {
    const result = await supabasePatch('customers', activeCustomer.id, data);
    if (result && result[0]) {
      Object.assign(activeCustomer, result[0]);
      const idx = customers.findIndex(c => c.id === activeCustomer.id);
      if (idx >= 0) customers[idx] = activeCustomer;
      isDirty = false;
      isEditMode = false;
      setReadonly(true);
      document.getElementById('cardName').textContent = activeCustomer.name;
      document.getElementById('cardNumber').textContent = activeCustomer.customer_number ? `#${activeCustomer.customer_number}` : '';
      document.getElementById('editToggleBtn').textContent = '✎ Muokkaa';
      document.getElementById('editActions').style.display = 'none';
      el.className = 'saving ok'; el.textContent = '✓ Tallennettu';
      setTimeout(() => el.textContent = '', 2500);
      renderList();
    } else {
      el.className = 'saving err'; el.textContent = 'Virhe tallennuksessa';
    }
  } catch(e) {
    el.className = 'saving err'; el.textContent = 'Verkkovirhe';
  }
}

async function toggleArchive() {
  const newState = !activeCustomer.is_active;
  const verb = newState ? 'palauttaa' : 'arkistoida';
  if (!confirm(`Haluatko ${verb} asiakkaan ${activeCustomer.name}?`)) return;
  const result = await supabasePatch('customers', activeCustomer.id, { is_active: newState });
  if (result && result[0]) {
    Object.assign(activeCustomer, result[0]);
    const idx = customers.findIndex(c => c.id === activeCustomer.id);
    if (idx >= 0) customers[idx] = activeCustomer;
    showCustomer();
    renderList();
  }
}

// =============================================
// UUSI ASIAKAS
// =============================================
function uusiAsiakas() {
  if (isDirty && !confirm('Tallentamattomat muutokset häviävät. Jatketaanko?')) return;
  activeCustomer = null;
  isDirty = false;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('customerCard').style.display = 'none';
  document.getElementById('newCustomerForm').style.display = 'block';
  // Tyhjennetään kaikki kentät
  ['new_name','new_contact_person','new_business_id','new_ovt_number',
   'new_billing_address','new_billing_postal_code','new_billing_city',
   'new_phone','new_email','new_email2','new_notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('new_billing_country').value = 'Suomi';
  document.getElementById('new_customer_number').value = '';
  document.getElementById('newSaveStatus').textContent = '';
  // Mobiili: avaa oikea paneeli
  document.getElementById('rightPanel').classList.add('mobile-open');
  document.getElementById('new_name').focus();
  renderList();
}

function cancelNew() {
  document.getElementById('newCustomerForm').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
}

async function createCustomer() {
  const el = document.getElementById('newSaveStatus');
  el.className = 'saving'; el.textContent = 'Tallennetaan...';

  // Haetaan seuraava vapaa asiakasnumero Supabasesta
  let nextNum = null;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/next_customer_number`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
    nextNum = await r.json();
    document.getElementById('new_customer_number').value = nextNum;
  } catch(e) {}

  const data = {
    name: document.getElementById('new_name').value.trim().toUpperCase(),
    customer_number: nextNum ? String(nextNum) : null,
    contact_person: document.getElementById('new_contact_person').value.trim() || null,
    business_id: document.getElementById('new_business_id').value.trim() || null,
    billing_address: (document.getElementById('new_billing_address').value.trim() || '').toUpperCase() || null,
    billing_postal_code: document.getElementById('new_billing_postal_code').value.trim() || null,
    billing_city: (document.getElementById('new_billing_city').value.trim() || '').toUpperCase() || null,
    billing_country: 'Suomi',
    phone: document.getElementById('new_phone').value.trim() || null,
    email: document.getElementById('new_email').value.trim() || null,
    email2: document.getElementById('new_email2').value.trim() || null,
    ovt_number: document.getElementById('new_ovt_number').value.trim() || null,
    notes: document.getElementById('new_notes').value.trim() || null,
    is_active: true,
  };
  if (!data.name) { el.className = 'saving err'; el.textContent = 'Nimi puuttuu!'; return; }
  try {
    const result = await supabasePost('customers', data);
    if (result && result[0]) {
      customers.push(result[0]);
      customers.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      el.className = 'saving ok'; el.textContent = '✓ Luotu!';
      setTimeout(() => { selectCustomer(result[0].id); }, 500);
    } else {
      el.className = 'saving err'; el.textContent = 'Virhe luonnissa';
    }
  } catch(e) {
    el.className = 'saving err'; el.textContent = 'Verkkovirhe';
  }
}

// =============================================
// TILAUSHISTORIA
// =============================================
async function loadOrders(customerId) {
  document.getElementById('orderList').innerHTML = '<div class="empty-state" style="padding:24px;">Ladataan...</div>';
  document.getElementById('orderCount').textContent = '...';
  const data = await supabaseGet('quotes', `?customer_id=eq.${customerId}&order=created_at.desc&select=id,order_date,status,notes,kohde`);
  const orders = Array.isArray(data) ? data : [];
  document.getElementById('orderCount').textContent = `${orders.length} tarjousta`;
  if (!orders.length) {
    document.getElementById('orderList').innerHTML = '<div class="empty-state" style="padding:28px;">Ei tarjouksia</div>';
    return;
  }
  const statusLabel = {
    DRAFT: 'Luonnos', IN_PROGRESS: 'Kesken', QUOTED: 'Tarjottu',
    ORDERED: 'Tilattu', IN_PRODUCTION: 'Työn alla',
    COMPLETED: 'Valmis', INVOICED: 'Laskutettu', ARCHIVED: 'Arkisto'
  };
  const statusClass = {
    DRAFT: 'status-draft', IN_PROGRESS: 'status-active', QUOTED: 'status-active',
    ORDERED: 'status-active', IN_PRODUCTION: 'status-active',
    COMPLETED: 'status-done', INVOICED: 'status-done', ARCHIVED: 'status-draft'
  };
  document.getElementById('orderList').innerHTML = orders.map(o => `
    <div class="order-row" onclick="avaaTilaus('${o.id}')">
      <span class="order-date">${(o.created_at || '').slice(0,10)}</span>
      <span class="order-kohde">${o.quote_number || '—'}</span>
      <span class="order-desc">${o.notes || ''}</span>
      <span class="order-status ${statusClass[o.status] || 'status-draft'}">${statusLabel[o.status] || o.status}</span>
      <button class="copy-order-btn" onclick="event.stopPropagation(); kopioi('${o.id}', true)" title="Kopioi uudeksi tilaukseksi samalle asiakkaalle">⧉ Kopioi</button>
    </div>
  `).join('');
}

function uusiTilaus() {
  if (!activeCustomer) return;
  localStorage.setItem('newOrderCustomerId', activeCustomer.id);
  localStorage.setItem('newOrderCustomerName', activeCustomer.name);
  window.open('tarjous.html', '_blank');
}

function avaaTilaus(orderId) {
  localStorage.setItem('openOrderId', orderId);
  window.open('tarjous.html', '_blank');
}

function kopioi(orderId, keepCustomer) {
  localStorage.setItem('copyOrderId', orderId);
  localStorage.setItem('copyKeepCustomer', keepCustomer ? 'true' : 'false');
  window.open('tarjous.html', '_blank');
}

// =============================================
// SIDEBAR RESIZE
// =============================================
(function() {
  const resizer = document.getElementById('sidebarResizer');
  const main = document.getElementById('mainGrid');
  const STORAGE_KEY = 'asiakkaat_sidebar_width';
  let saved = localStorage.getItem(STORAGE_KEY);
  if (saved) main.style.gridTemplateColumns = `${saved}px 1fr`;

  resizer.addEventListener('mousedown', e => {
    e.preventDefault();
    resizer.classList.add('dragging');
    const onMove = e2 => {
      const w = Math.max(240, Math.min(600, e2.clientX));
      main.style.gridTemplateColumns = `${w}px 1fr`;
    };
    const onUp = e2 => {
      resizer.classList.remove('dragging');
      const w = Math.max(240, Math.min(600, e2.clientX));
      localStorage.setItem(STORAGE_KEY, w);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// =============================================
// NAVIGAATIO
// =============================================
function toggleNav(e) {
  e.stopPropagation();
  document.getElementById('navDropdown').classList.toggle('open');
}
document.addEventListener('click', function() {
  document.getElementById('navDropdown').classList.remove('open');
});

loadCustomers();
</script>
