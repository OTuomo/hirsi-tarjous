<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjous — Okkosen Puutuote</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #1c1a14; --panel: #2a2720; --border: #4a4535;
    --accent: #d97706; --accent-dim: #b45309; --accent-glow: rgba(217,119,6,0.15);
    --text: #ededf0; --text-dim: #9595a0; --input-bg: #333028;
    --success: #3dba6e; --danger: #e84040; --warn: #e8a020; --section-header: #222018;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }
  header { background: #141210; border-bottom: 2px solid var(--accent); padding: 10px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  header .logo { height: 32px; width: auto; }
  header h1 { font-size: 16px; font-weight: 500; color: var(--text); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .nav-menu-wrap { position: relative; }
  .nav-btn { background: #3a3545; border: 1px solid #585568; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 4px; cursor: pointer; letter-spacing: 0.04em; }
  .nav-btn:hover { background: #4a4558; }
  .nav-dropdown { display: none; position: absolute; top: calc(100% + 6px); left: 0; background: #3a3545; border: 1px solid var(--border); border-radius: 6px; min-width: 200px; z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,0.4); overflow: hidden; }
  .nav-dropdown.open { display: block; }
  .nav-section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); padding: 8px 14px 4px; }
  .nav-item { display: block; width: 100%; text-align: left; padding: 8px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text); background: none; border: none; cursor: pointer; text-decoration: none; transition: background 0.1s; }
  .nav-item:hover { background: var(--accent-glow); color: var(--accent); }
  .nav-item.current { color: var(--accent); font-weight: 600; }
  .nav-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
  .btn { padding: 8px 14px; border: none; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #686578; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-warn { background: var(--warn); color: #1a1a1a; }
  .btn-warn:hover { background: #f0b030; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-xs { padding: 3px 7px; font-size: 10px; }
  .saving { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
  .saving.ok { color: var(--success); }
  .saving.err { color: var(--danger); }
  .page { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; display: flex; flex-direction: column; gap: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; }
  .panel-header { background: var(--section-header); border-bottom: 1px solid var(--border); border-radius: 6px 6px 0 0; padding: 10px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  .panel-body { padding: 16px; }
  .basics-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  label { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
  input, select, textarea { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 7px 9px; border-radius: 4px; width: 100%; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  input[readonly] { color: var(--text-dim); cursor: default; background: #252218; border-color: transparent; }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }
  select option { background: var(--panel); }
  textarea { resize: vertical; min-height: 100px; }

  /* ASIAKASHAKU */
  .customer-row { display: flex; gap: 8px; align-items: flex-end; }
  .customer-row .customer-search-wrap { flex: 1; }
  .customer-search-wrap { position: relative; }
  .customer-dropdown { display: none; position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: #3a3530; border: 1px solid var(--border); border-radius: 4px; z-index: 50; max-height: 240px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .customer-dropdown.open { display: block; }
  .cust-option { padding: 8px 12px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 12px; border-bottom: 1px solid var(--border); }
  .cust-option:last-child { border-bottom: none; }
  .cust-option:hover { background: var(--accent-glow); color: var(--accent); }
  .cust-option .cust-num { font-size: 10px; color: var(--text-dim); margin-left: 8px; }

  /* NIMIKEHAKU */
  .nimike-wrap { position: relative; }
  .nimike-dropdown { display: none; position: fixed; min-width: 320px; background: #3a3530; border: 1px solid var(--border); border-radius: 4px; z-index: 500; max-height: 220px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  .nimike-dropdown.open { display: block; }
  .nimike-option { padding: 6px 10px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 11px; border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nimike-option:hover { background: var(--accent-glow); color: var(--accent); }
  .nimike-option .nimike-code { color: var(--text-dim); margin-right: 6px; font-size: 10px; }

  /* SECTION ROW */
  .section-row { background: #222018; border: 1px solid var(--border); border-radius: 5px; margin-bottom: 4px; }
  .section-row.inactive { opacity: 0.45; }
  .section-row-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .section-row-header input[type="text"] { background: transparent; border: none; color: var(--text); font-weight: 600; font-size: 13px; padding: 0; width: auto; flex: 1; }
  .section-row-header input[type="text"]:focus { border-bottom: 1px solid var(--accent); outline: none; }
  .section-toggle { width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid var(--accent); background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0; }
  .section-toggle.on { background: var(--accent); }
  .section-toggle.on::after { content: '✓'; color: #fff; font-size: 10px; line-height: 1; }
  .move-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 3px; }
  .move-btn:hover { background: var(--accent-glow); color: var(--accent); }
  .section-subtotal { padding: 6px 12px 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); text-align: right; }
  .section-subtotal span { color: var(--accent); font-weight: 600; }
  .product-rows { overflow-x: auto; overflow-y: visible; }
  table.product-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 640px; }
  table.product-table th { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 8px; border-bottom: 1px solid var(--border); text-align: left; }
  table.product-table th.right { text-align: right; }
  table.product-table td { padding: 3px 4px; vertical-align: middle; border-bottom: 1px solid #33302a; }
  table.product-table tr:last-child td { border-bottom: none; }
  table.product-table input, table.product-table select { padding: 5px 7px; font-size: 12px; }
  .price-manual { background: rgba(217,119,6,0.18) !important; }
  .restore-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 11px; padding: 2px 4px; }
  .restore-btn:hover { color: var(--accent); }
  .del-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; padding: 2px 5px; border-radius: 3px; }
  .del-btn:hover { background: rgba(232,64,64,0.15); }
  .add-row-wrap { padding: 6px 12px 10px; }

  /* YHTEENVETO */
  .summary-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; display: flex; justify-content: flex-end; }
  .summary-table { font-family: 'IBM Plex Mono', monospace; font-size: 13px; width: 320px; }
  .summary-table tr td { padding: 4px 0; }
  .summary-table .label { color: var(--text-dim); padding-right: 16px; }
  .summary-table .value { text-align: right; color: var(--text); }
  .summary-table .big td { font-size: 16px; font-weight: 600; color: var(--accent); padding-top: 8px; border-top: 1px solid var(--border); }
  .summary-table input.adj { width: 90px; text-align: right; padding: 4px 7px; font-size: 12px; }
  .default-text-wrap textarea { width: 100%; min-height: 100px; font-size: 12px; }
  .action-bar { display: flex; gap: 10px; flex-wrap: wrap; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
  /* Varmista että status-valikko ei leikkaudu sivun alareunassa */
  .action-bar select { max-height: 200px; }
  .action-bar .spacer { flex: 1; }
  .status-badge { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 3px; letter-spacing: 0.06em; }
  .status-badge.draft    { background: #44444f; color: var(--text-dim); }
  .status-badge.progress { background: #3d2e1e; color: var(--warn); }
  .status-badge.sent     { background: #1e3d2e; color: var(--success); }
  .status-badge.model    { background: #2a1e3d; color: #c084fc; }
  .status-badge.archived { background: #2a2a2a; color: #666; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 24px; width: 480px; max-width: 96vw; display: flex; flex-direction: column; gap: 14px; }
  .modal h2 { font-size: 15px; font-weight: 600; color: var(--accent); font-family: 'IBM Plex Mono', monospace; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  /* MOBIILI */
  @media (max-width: 640px) {
    .basics-grid { grid-template-columns: 1fr 1fr; }
    .page { padding: 12px 12px 60px; gap: 12px; }
    table.product-table { display: none; }
    .product-card-list { display: block !important; }
    .summary-table { width: 100%; }
    .action-bar { flex-direction: column; }
  }
  .product-card-list { display: none; }
  .product-card { background: var(--input-bg); border: 1px solid var(--border); border-radius: 5px; padding: 10px 12px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
  .product-card .card-row { display: flex; gap: 8px; align-items: center; }
  .product-card label { min-width: 60px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <img src="okkonenlogopuu.svg" alt="Okkosen Puutuote" class="logo">
  <div class="nav-menu-wrap">
    <button class="nav-btn" onclick="toggleNav(event)">☰ Valikko</button>
    <div class="nav-dropdown" id="navDropdown">
      <div class="nav-section-label">Sivut</div>
      <a class="nav-item" href="asiakkaat.html">👤 Asiakkaat</a>
      <a class="nav-item" href="hinnasto.html">📦 Hinnasto</a>
      <a class="nav-item" href="tarjoukset.html">📋 Tarjoukset</a>
      <a class="nav-item current" href="tarjous.html">✏️ Tarjous</a>
    </div>
  </div>
  <h1>Tarjous</h1>
  <div class="header-right">
    <span class="saving" id="saveStatus"></span>
    <span class="status-badge draft" id="statusBadge">Luonnos</span>
  </div>
</header>


<!-- TEKSTIPOHJAT MODAL -->
<div class="modal-overlay" id="textTplModal">
  <div class="modal" style="width:560px;max-height:80vh;overflow-y:auto;">
    <h2>Tekstipohjien hallinta</h2>
    <div id="tplList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;"></div>
    <div style="border-top:1px solid var(--border);padding-top:14px;">
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;">Uusi pohja</div>
      <div class="field">
        <label>Nimi</label>
        <input type="text" id="tplNewName" placeholder="esim. Vakiotoimitus">
      </div>
      <div class="field" style="margin-top:8px;">
        <label>Sisältö</label>
        <textarea id="tplNewContent" rows="4" placeholder="Kirjoita tekstipohja..."></textarea>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <input type="checkbox" id="tplNewDefault" style="width:auto;">
        <label style="text-transform:none;letter-spacing:0;font-size:13px;">Oletus (latautuu automaattisesti uuteen tarjoukseen)</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeTextTemplateModal()">Sulje</button>
      <button class="btn btn-primary btn-sm" onclick="saveNewTextTemplate()">Lisää pohja</button>
    </div>
  </div>
</div>

<!-- LISÄÄ ASIAKAS MODAL -->
<div class="modal-overlay" id="newCustModal">
  <div class="modal">
    <h2>Uusi asiakas</h2>
    <div class="modal-grid">
      <div class="field" style="grid-column:1/-1">
        <label>Nimi *</label>
        <input type="text" id="nc_name" placeholder="Yritys tai henkilö">
      </div>
      <div class="field">
        <label>Puhelin</label>
        <input type="text" id="nc_phone" placeholder="0400 000 000">
      </div>
      <div class="field">
        <label>Sähköposti</label>
        <input type="text" id="nc_email" placeholder="email@example.com">
      </div>
      <div class="field">
        <label>Osoite</label>
        <input type="text" id="nc_address" placeholder="Katuosoite">
      </div>
      <div class="field">
        <label>Kaupunki</label>
        <input type="text" id="nc_city" placeholder="Kaupunki">
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Y-tunnus</label>
        <input type="text" id="nc_business_id" placeholder="1234567-8">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeNewCustModal()">Peruuta</button>
      <button class="btn btn-primary btn-sm" onclick="saveNewCustomer()">Tallenna asiakas</button>
    </div>
  </div>
</div>

<div class="page">

  <!-- PERUSTIEDOT -->
  <div class="panel">
    <div class="panel-header">Perustiedot</div>
    <div class="panel-body">
      <div class="basics-grid">
        <div class="field">
          <label>Asiakas *</label>
          <div class="customer-row">
            <div class="customer-search-wrap">
              <input type="text" id="customerSearch" placeholder="Hae nimellä..." autocomplete="off"
                oninput="searchCustomers(this.value)" onfocus="searchCustomers(this.value)">
              <div class="customer-dropdown" id="customerDropdown"></div>
            </div>
            <button class="btn btn-ghost btn-sm" style="white-space:nowrap;flex-shrink:0;" onclick="openNewCustModal()" title="Lisää uusi asiakas">+ Asiakas</button>
          </div>
          <input type="hidden" id="customerId">
        </div>
        <div class="field">
          <label>Tarjousnumero</label>
          <input type="text" id="quoteNumber" readonly placeholder="Automaattinen">
        </div>
        <div class="field">
          <label>Päivämäärä</label>
          <input type="date" id="quoteDate">
        </div>
        <div class="field">
          <label>Voimassa</label>
          <input type="date" id="quoteValid">
        </div>
        <div class="field">
          <label>Toimitusaste</label>
          <select id="deliveryType">
            <option value="">— valitse —</option>
            <option value="hirsitoimitus">Hirsitoimitus</option>
            <option value="puuosatoimitus">Puuosatoimitus</option>
            <option value="valmistoimitus">Valmistoimitus</option>
            <option value="nouto">Nouto tehtaalta</option>
            <option value="toimitettu">Toimitettu</option>
          </select>
        </div>
        <div class="field">
          <label>Toimitusviikko</label>
          <input type="text" id="deliveryWeek" placeholder="esim. 2026-32" maxlength="7">
        </div>
      </div>
      <div class="field" style="margin-top:10px;">
        <label>Kohde / viite</label>
        <input type="text" id="quoteRef" placeholder="Esim. kohteen nimi tai viite">
      </div>
    </div>
  </div>

  <!-- OSIOT JA TUOTERIVIT -->
  <div class="panel">
    <div class="panel-header">
      Tuoterivit
      <span style="margin-left:auto;"></span>
      <button class="btn btn-secondary btn-sm" onclick="addSection()">+ Lisää osio</button>
    </div>
    <div class="panel-body" style="padding:12px;">
      <div id="sectionsContainer"></div>
    </div>
  </div>

  <!-- YHTEENVETO -->
  <div class="summary-panel">
    <table class="summary-table">
      <tr><td class="label">Välisumma</td><td class="value" id="sumSubtotal">0,00 €</td></tr>
      <tr>
        <td class="label">Pyöristys / alennus</td>
        <td class="value"><input class="adj" type="number" id="adjAmount" value="0" step="0.01" oninput="recalcTotals()"></td>
      </tr>
      <tr><td class="label">Veroton yhteensä</td><td class="value" id="sumNoTax">0,00 €</td></tr>
      <tr><td class="label">ALV 25,5%</td><td class="value" id="sumVat">0,00 €</td></tr>
      <tr class="big"><td class="label">YHT</td><td class="value" id="sumTotal">0,00 €</td></tr>
    </table>
  </div>

  <!-- VAKIOTEKSTI -->
  <div class="panel">
    <div class="panel-header">
      Vakioteksti / huomiot
      <span style="margin-left:auto;font-weight:400;font-size:11px;color:var(--text-dim);">Pohja:</span>
      <select id="textTemplateSelect" onchange="applyTextTemplate(this.value)"
        style="font-size:11px;padding:3px 6px;width:auto;margin-left:6px;text-transform:none;letter-spacing:0;">
        <option value="">— valitse pohja —</option>
        <option value="__none__">Ei tekstiä</option>
      </select>
      <button onclick="openTextTemplateModal()" style="margin-left:8px;padding:2px 8px;font-size:11px;background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:3px;cursor:pointer;" title="Hallitse tekstipohjia">✎ Muokkaa pohjia</button>
    </div>
    <div class="panel-body default-text-wrap">
      <textarea id="defaultText" placeholder="Vakioteksti tai toimitushuomiot..."></textarea>
    </div>
  </div>

  <!-- TOIMINTOPAINIKKEET -->
  <div class="action-bar">
    <button class="btn btn-secondary" onclick="saveDraft()">💾 Tallenna</button>
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;">Status:</label>
      <select id="statusSelect" onchange="changeStatus(this.value)"
        style="font-size:12px;padding:6px 10px;width:auto;font-family:'IBM Plex Mono',monospace;">
        <option value="DRAFT">Luonnos</option>
        <option value="IN_PROGRESS">Kesken</option>
        <option value="QUOTED">Tarjottu</option>
        <option value="ORDERED">Tilattu</option>
        <option value="COMPLETED">Valmis</option>
        <option value="ARCHIVED">Arkisto</option>
        <option value="MODEL">Malli</option>
      </select>
    </div>
    <!-- TUOTANNON ETENEMINEN (näkyy vain ORDERED-tilassa) -->
    <div id="prodStatus" style="display:none;align-items:center;gap:12px;padding:6px 12px;background:rgba(217,119,6,0.08);border:1px solid rgba(217,119,6,0.2);border-radius:4px;">
      <span style="font-size:11px;color:var(--accent);font-family:'IBM Plex Mono',monospace;font-weight:600;white-space:nowrap;">TUOTANTO:</span>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-dim);cursor:pointer;white-space:nowrap;">
        <input type="checkbox" id="prodTuotannossa" style="width:auto;" onchange="saveProdStatus()">
        Tuotannossa
      </label>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-dim);cursor:pointer;white-space:nowrap;">
        <input type="checkbox" id="prodValmis" style="width:auto;" onchange="saveProdStatus()">
        Valmis noutoon/lähetykseen
      </label>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-dim);cursor:pointer;white-space:nowrap;">
        <input type="checkbox" id="prodToimitettu" style="width:auto;" onchange="saveProdStatus()">
        Toimitettu
      </label>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-left:4px;">
      <input type="checkbox" id="showPrices" checked style="width:auto;cursor:pointer;">

async function loadCustomers() {

async function loadProducts() {
  const data = await sbGet('products', '?order=code.asc,name.asc&select=id,code,name,unit,price,category,pricing_model,kuutiohinta,tyosto_kuutio,salvostus_kuutio,leveys,mitta,aihio_leveys,aihio_paksuus,kate_percent');
  products = Array.isArray(data) ? data : [];
  console.log('Tuotteet ladattu:', products.length, 'kpl');
  products.forEach(p => {
    if (p.pricing_model === 'cubic' && p.kuutiohinta != null) {
      const kate = 1 + (parseFloat(p.kate_percent) || 0);
      const al = parseFloat(p.aihio_leveys || p.leveys || 0);
      const ap = parseFloat(p.aihio_paksuus || p.mitta || 0);
      const mv = (parseFloat(p.kuutiohinta) + parseFloat(p.tyosto_kuutio||0) + parseFloat(p.salvostus_kuutio||0)) * kate;
      p.price = al && ap ? mv * al * ap / 1000000 : p.price;
    }
  });
}

async function loadTextTemplates() {

    textTemplates = data;

      sel.appendChild(opt);

      document.getElementById('defaultText').value = def.content;
      document.getElementById('textTemplateSelect').value = def.id;
    }
  } catch(e) {}
}

function applyTextTemplate(val) {
  if (val === '__none__') {
    document.getElementById('defaultText').value = '';

  }
  if (!val) return;
  const t = textTemplates.find(x => String(x.id) === String(val));
  if (t) {
    if (document.getElementById('defaultText').value && !confirm('Korvataanko nykyinen teksti valitulla pohjalla?')) return;
    document.getElementById('defaultText').value = t.content;
  }
}

async function saveTpl(id) {
  const name    = document.getElementById('tplName_' + id).value.trim();

    for (const t of textTemplates.filter(x => x.id !== id && x.is_default)) {
      await sbPatch('quote_text_templates', t.id, { is_default: false });
    }
  }
  await sbPatch('quote_text_templates', id, { name, content, is_default: isDef });
  await reloadTpl();

// =============================================
// NIMIKEHAKU (teksti)
// =============================================
function positionNimikeDropdown(secId, rowId) {
  const input = document.getElementById(`nimike-${secId}-${rowId}`);
  const dd = document.getElementById(`nimike-dd-${secId}-${rowId}`);
  if (!input || !dd) return;
  const rect = input.getBoundingClientRect();
  dd.style.top = (rect.bottom + 2) + 'px';
  dd.style.left = rect.left + 'px';
  dd.style.width = Math.max(rect.width, 320) + 'px';
}

function onNimikeFocus(secId, rowId) {
  positionNimikeDropdown(secId, rowId);
  onNimikeInput(secId, rowId, document.getElementById(`nimike-${secId}-${rowId}`).value);
}

function onNimikeInput(secId, rowId, val) {
  const sec = sections.find(s => s.id === secId);
  const row = sec && sec.rows.find(r => r.id === rowId);
  if (!row) return;
  row.nimikeTeksti = val;
  const dd = document.getElementById(`nimike-dd-${secId}-${rowId}`);
  if (!dd) return;
  positionNimikeDropdown(secId, rowId);
  if (!products.length) {
    dd.innerHTML = '<div class="nimike-option" style="color:var(--text-dim)">Hinnastoa ei löydy — tarkista yhteys</div>';
    dd.classList.add('open');
    return;
  }
  const q = val.toLowerCase().trim();
  const hits = q.length >= 1
    ? products.filter(p =>
        (p.name||'').toLowerCase().includes(q) ||
        (p.code||'').toLowerCase().includes(q) ||
        (p.category||'').toLowerCase().includes(q)
      ).slice(0, 25)
    : products.slice(0, 25);
  if (!hits.length) {
    dd.innerHTML = '<div class="nimike-option" style="color:var(--text-dim)">Ei tuloksia</div>';
    dd.classList.add('open');
    return;
  }
  dd.innerHTML = hits.map(p =>
    `<div class="nimike-option" onclick="selectNimike(${secId},${rowId},'${p.id}')">
      <span class="nimike-code">${p.code||''}</span>${p.name}
      <span style="color:var(--text-dim);font-size:10px;margin-left:6px;">${p.unit||''}</span>
    </div>`
  ).join('');
  dd.classList.add('open');
}

function selectNimike(secId, rowId, productId) {
  const sec = sections.find(s => s.id === secId);
  const row = sec && sec.rows.find(r => r.id === rowId);
  if (!row) return;
  const prod = products.find(p => p.id === productId || String(p.id) === String(productId));
  if (prod) {
    row.productId = prod.id;
    row.nimikeTeksti = (prod.code ? prod.code + ' – ' : '') + prod.name;
    if (!row.desc) row.desc = prod.name;
    row.unit = prod.unit || row.unit;
    row.basePrice = prod.price != null ? parseFloat(prod.price) : null;
    if (!row.priceManual && row.basePrice !== null) row.price = row.basePrice;
  }
  const dd = document.getElementById(`nimike-dd-${secId}-${rowId}`);
  if (dd) dd.classList.remove('open');
  renderSections();
}

function addRow(secId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  sec.rows.push({ id: ++rowIdCounter, productId: '', nimikeTeksti: '', desc: '', qty: '', unit: '', price: '', priceManual: false, basePrice: null });
  renderSections();
}

function removeRow(secId, rowId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  sec.rows = sec.rows.filter(r => r.id !== rowId);
  renderSections();
}

function removeSection(id) {
  if (sections.length <= 1) { alert('Vähintään yksi osio täytyy olla.'); return; }
  if (!confirm('Poistetaanko osio ja kaikki sen rivit?')) return;
  sections = sections.filter(s => s.id !== id);
  renderSections();
}

function toggleSection(id) {
  const sec = sections.find(s => s.id === id);
  if (sec) { sec.active = !sec.active; renderSections(); }
}

function renameSection(id, val) {
  const sec = sections.find(s => s.id === id);
  if (sec) sec.name = val;
}

function moveSection(id, dir) {
  const idx = sections.findIndex(s => s.id === id);
  const nIdx = idx + dir;
  if (nIdx < 0 || nIdx >= sections.length) return;
  [sections[idx], sections[nIdx]] = [sections[nIdx], sections[idx]];
  renderSections();
}

function onProductSelect(secId, rowId, productId) {
  selectNimike(secId, rowId, productId);
}

function onRowInput(secId, rowId, field, val) {
  const sec = sections.find(s => s.id === secId);
  const row = sec && sec.rows.find(r => r.id === rowId);
  if (row) { row[field] = val; updateRowSum(secId, rowId); }
}

function onPriceInput(secId, rowId, val) {
  const sec = sections.find(s => s.id === secId);
  const row = sec && sec.rows.find(r => r.id === rowId);
  if (!row) return;
  row.price = val;
  row.priceManual = (row.basePrice !== null && parseFloat(val) !== parseFloat(row.basePrice));
  updateRowSum(secId, rowId);
}

function restorePrice(secId, rowId) {
  const sec = sections.find(s => s.id === secId);
  const row = sec && sec.rows.find(r => r.id === rowId);
  if (!row || row.basePrice === null) return;
  row.price = row.basePrice;
  row.priceManual = false;
  renderSections();
}

function updateRowSum(secId, rowId) {
  const sec = sections.find(s => s.id === secId);
  const row = sec && sec.rows.find(r => r.id === rowId);
  if (!row) return;
  const el = document.getElementById(`rowsum-${secId}-${rowId}`);
  if (el) el.textContent = fmt(rowSum(row)) + ' €';
  const ss = document.getElementById(`subsub-${secId}`);
  if (ss) ss.textContent = fmt(sectionSum(sec));
  recalcTotals();
}

function rowSum(row) { return (parseFloat(row.qty)||0) * (parseFloat(row.price)||0); }

function sectionSum(sec) {
  if (!sec.active) return 0;
  return sec.rows.reduce((a,r) => a + rowSum(r), 0);
}

function recalcTotals() {
  const sub = sections.reduce((a,s) => a + sectionSum(s), 0);
  const adj = parseFloat(document.getElementById('adjAmount').value) || 0;
  const noTax = sub + adj;
  const vat = noTax * 0.255;
  document.getElementById('sumSubtotal').textContent = fmt(sub) + ' €';
  document.getElementById('sumNoTax').textContent = fmt(noTax) + ' €';
  document.getElementById('sumVat').textContent = fmt(vat) + ' €';
  document.getElementById('sumTotal').textContent = fmt(noTax + vat) + ' €';
  sections.forEach(sec => {
    const el = document.getElementById(`subsub-${sec.id}`);
    if (el) el.textContent = fmt(sectionSum(sec));
  });
}

function fmt(n) {
  return Number(n).toLocaleString('fi-FI', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// =============================================
// TALLENNUS
// =============================================
function buildQuoteData(status) {
  const sub = sections.reduce((a,s) => a + sectionSum(s), 0);
  const adj = parseFloat(document.getElementById('adjAmount').value) || 0;
  const noTax = sub + adj;
  const vat = noTax * 0.255;
  return {
    customer_id: document.getElementById('customerId').value || null,
    quote_number: document.getElementById('quoteNumber').value || null,
    valid_until: document.getElementById('quoteValid').value || null,
    status: status || currentStatus,
    notes: document.getElementById('quoteRef').value || null,
    footer_text: document.getElementById('defaultText').value || null,
    discount_amount: adj,
    sections_json: JSON.stringify(sections),
    delivery_type: document.getElementById('deliveryType').value || null,
    delivery_week: document.getElementById('deliveryWeek').value.trim() || null,
    is_template: false,
    total_net: Math.round(noTax * 100) / 100,
    total_vat: Math.round(vat * 100) / 100,
    total_gross: Math.round((noTax + vat) * 100) / 100,
  };
}

async function saveDraft() {
  const el = document.getElementById('saveStatus');
  el.className = 'saving'; el.textContent = 'Tallennetaan...';
  try {
    const data = buildQuoteData(currentStatus);
    let result;
    if (currentQuoteId) {
      result = await sbPatch('quotes', currentQuoteId, data);
    } else {
      result = await sbPost('quotes', data);
      if (result && result[0]) currentQuoteId = result[0].id;
    }
    el.className = 'saving ok'; el.textContent = '✓ Tallennettu';
    setTimeout(() => el.textContent = '', 2500);
  } catch(e) {
    el.className = 'saving err'; el.textContent = 'Virhe tallennuksessa';
  }
}


async function saveProdStatus() {
  if (!currentQuoteId) return;
  try {
    await sbPatch('quotes', currentQuoteId, {
      prod_tuotannossa: document.getElementById('prodTuotannossa').checked,
      prod_valmis:      document.getElementById('prodValmis').checked,
      prod_toimitettu:  document.getElementById('prodToimitettu').checked,
    });
  } catch(e) { console.error('saveProdStatus:', e); }
}

async function changeStatus(newStatus) {
  currentStatus = newStatus;
  updateStatusBadge();
  document.getElementById('prodStatus').style.display = ['ORDERED','COMPLETED'].includes(newStatus) ? 'flex' : 'none';
  if (currentQuoteId) {
    try { await sbPatch('quotes', currentQuoteId, { status: newStatus }); } catch(e) {}
  }
}

// =============================================
// LATAUS
// =============================================
async function loadQuote(id) {
  const data = await sbGet('quotes', `?id=eq.${id}&select=*`);
  const q = Array.isArray(data) ? data[0] : null;
  if (!q) return;
  currentQuoteId = q.id;
  currentStatus = q.status || 'DRAFT';
  document.getElementById('prodStatus').style.display = ['ORDERED','COMPLETED'].includes(currentStatus) ? 'flex' : 'none';
  document.getElementById('quoteNumber').value = q.quote_number || '';
  document.getElementById('quoteDate').value = (q.created_at||'').slice(0,10);
  document.getElementById('quoteValid').value = (q.valid_until||'').slice(0,10);
  document.getElementById('deliveryWeek').value = q.delivery_week || '';
  document.getElementById('prodTuotannossa').checked = q.prod_tuotannossa || false;
  document.getElementById('prodValmis').checked      = q.prod_valmis      || false;
  document.getElementById('prodToimitettu').checked  = q.prod_toimitettu  || false;
  document.getElementById('deliveryType').value = q.delivery_type || '';
  document.getElementById('quoteRef').value = q.notes || '';
  document.getElementById('defaultText').value = q.footer_text || '';
  document.getElementById('adjAmount').value = q.discount_amount || 0;
  if (q.customer_id) {
    const cust = customers.find(c => c.id === q.customer_id);
    if (cust) setCustomer(cust.id, cust.name);
  }
  if (q.sections_json) {
    try {
      sections = JSON.parse(q.sections_json);
      sections.forEach(s => s.rows.forEach(r => { if (r.id > rowIdCounter) rowIdCounter = r.id; }));
      sections.forEach(s => { if (s.id > sectionIdCounter) sectionIdCounter = s.id; });
    } catch(e) { sections = []; addSection('Hirsikehikko'); }
  }
  renderSections();
  updateStatusBadge();
}

async function copyQuoteFrom(id, keepPrices) {
  const data = await sbGet('quotes', `?id=eq.${id}&select=*`);
  const q = Array.isArray(data) ? data[0] : null;
  if (!q) return;
  document.getElementById('deliveryType').value = q.delivery_type || '';
  document.getElementById('quoteRef').value = q.notes || '';
  document.getElementById('defaultText').value = q.footer_text || '';
  document.getElementById('adjAmount').value = q.discount_amount || 0;
  if (q.sections_json) {
    try {
      sections = JSON.parse(q.sections_json);
      sectionIdCounter = 0; rowIdCounter = 0;
      sections.forEach(s => {
        s.id = ++sectionIdCounter;
        s.rows.forEach(r => {
          r.id = ++rowIdCounter;
          if (!keepPrices) {
            const prod = products.find(p => p.id === r.productId || String(p.id) === String(r.productId));
            if (prod) {
              r.basePrice = prod.price != null ? parseFloat(prod.price) : null;
              r.price = r.basePrice || '';
              r.priceManual = false;
            }
          }
        });
      });
    } catch(e) { sections = []; addSection('Hirsikehikko'); }
  }
  renderSections();
}

async function copyQuote() {
  if (!currentQuoteId) { alert('Tallenna tarjous ensin.'); return; }
  const keepPrices = confirm('Kopioidaanko hinnat sellaisenaan?\n\nOK = Säilytä vanhat hinnat\nPeruuta = Hae uudet hinnat hinnastosta');
  window.open(`tarjous.html?copy=${currentQuoteId}&keepPrices=${keepPrices?'1':'0'}`, '_blank');
}

function updateStatusBadge() {
  const badge = document.getElementById('statusBadge');
  const sel = document.getElementById('statusSelect');
  const map = {
    DRAFT:       ['draft',    'Luonnos'],
    IN_PROGRESS: ['progress', 'Kesken'],
    QUOTED:      ['sent',     'Tarjottu'],
    ARCHIVED:    ['archived', 'Arkisto'],
    MODEL:       ['model',    'Malli'],
  };
  const [cls, label] = map[currentStatus] || ['draft', currentStatus];
  badge.className = `status-badge ${cls}`;
  badge.textContent = label;
  if (sel) sel.value = currentStatus;
}

// =============================================
// TULOSTUS
// =============================================
function printQuote() {
  if (!currentQuoteId) { alert('Tallenna tarjous ensin.'); return; }
  const showPrices = document.getElementById('showPrices').checked ? '1' : '0';
  window.open(`print_quote.html?id=${currentQuoteId}&prices=${showPrices}`, '_blank');
}

function printSupply() {
  if (!currentQuoteId) { alert('Tallenna tarjous ensin.'); return; }
  window.open(`print_supply.html?id=${currentQuoteId}`, '_blank');
}

// =============================================
// NAV
// =============================================
function toggleNav(e) {
  e.stopPropagation();
  document.getElementById('navDropdown').classList.toggle('open');
}
