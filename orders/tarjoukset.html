<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjoukset — Okkosen Puutuote</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

:root {
  --bg: #1c1a14;
  --panel: #2a2720;
  --panel2: #2f2b23;
  --border: #4a4535;

  --accent: #3a6b7a;
  --accent-dim: #2d5561;
  --accent-glow: rgba(58,107,122,0.15);

  --text: #ededf0;
  --text-dim: #9595a0;

  --success: #3dba6e;
  --danger: #e84040;
}

* { box-sizing:border-box; }

body {
  margin:0;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
}

/* HEADER */
header {
  background:#111d20;
  border-bottom:2px solid var(--accent);
  padding:10px 20px;
  display:flex;
  align-items:center;
}

.header-right {
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:12px;
}

.nav a {
  color:var(--text-dim);
  text-decoration:none;
  font-family:'IBM Plex Mono';
  font-size:12px;
}

.nav a.current {
  color:var(--accent);
  font-weight:600;
}

.btn {
  background:var(--accent);
  border:none;
  padding:8px 12px;
  color:#fff;
  cursor:pointer;
  font-family:'IBM Plex Mono';
}

/* SUMMARY */
.summary {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:10px;
  padding:20px;
}

.card {
  background:var(--panel2);
  border:1px solid var(--border);
  padding:12px;
  cursor:pointer;
}

.card.active {
  border-color:var(--accent);
  background:var(--accent-glow);
}

/* FILTER */
.filter {
  padding:0 20px 10px;
}

.filter input {
  width:250px;
  padding:6px;
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
}

/* TABLE */
.table-wrap {
  margin:0 20px 20px;
  background:var(--panel);
  border:1px solid var(--border);
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid var(--border);
}

th {
  font-size:11px;
  color:var(--text-dim);
  cursor:pointer;
}

tr:hover {
  background:var(--accent-glow);
}

/* BADGE */
.badge {
  padding:3px 8px;
  font-size:11px;
  cursor:pointer;
  font-family:'IBM Plex Mono';
}

.draft { color: var(--text-dim); }
.quoted { color: var(--accent); }
.ordered { color: var(--success); }
.archived { color: #777; }

/* STATUS MENU */
.status-wrap { position:relative; }

.status-menu {
  position:absolute;
  top:120%;
  left:0;
  background:var(--panel2);
  border:1px solid var(--border);
  display:none;
  z-index:10;
}

.status-menu.open { display:block; }

.status-item {
  padding:6px 10px;
  cursor:pointer;
}

.status-item:hover {
  background:var(--accent-glow);
}

/* EXPIRED */
.expired {
  color:var(--danger);
  font-weight:600;
}

</style>
</head>

<body>

<header>
  <div>Tarjoukset</div>

  <div class="header-right nav">
    <a href="asiakkaat.html">Asiakkaat</a>
    <a href="hinnasto.html">Hinnasto</a>
    <a href="tarjoukset.html" class="current">Tarjoukset</a>
    <a href="tarjous.html">Tarjous</a>
    <button class="btn" onclick="newQuote()">+ Uusi tarjous</button>
  </div>
</header>

<!-- SUMMARY -->
<div class="summary" id="summary"></div>

<!-- SEARCH -->
<div class="filter">
  <input placeholder="Hae asiakas / tarjousnro..." oninput="search(this.value)">
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
  <th onclick="sort('number')">Tarjousnro</th>
  <th onclick="sort('date')">Pvm</th>
  <th onclick="sort('customer')">Asiakas</th>
  <th>Toimitus</th>
  <th onclick="sort('valid')">Voimassa</th>
  <th onclick="sort('total')">Summa €</th>
  <th>Status</th>
  <th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

<script>

// MOCK DATA
let data = [
  {id:1, number:"2026-001", date:"2026-04-01", customer:"Matti", delivery:"Hirsirunko", valid:"2026-04-10", total:12430, status:"QUOTED"},
  {id:2, number:"2026-002", date:"2026-04-05", customer:"Rakennus Oy", delivery:"Avaimet", valid:"2026-04-20", total:54300, status:"ORDERED"},
  {id:3, number:"2026-003", date:"2026-03-01", customer:"Testi Oy", delivery:"Runko", valid:"2026-03-15", total:22000, status:"QUOTED"},
]

let filtered = [...data]
let currentFilter = "ALL"

// SUMMARY
function renderSummary() {
  const counts = {
    ACTIVE: data.filter(x=>x.status==="QUOTED"||x.status==="DRAFT").length,
    QUOTED: data.filter(x=>x.status==="QUOTED").length,
    ORDERED: data.filter(x=>x.status==="ORDERED").length,
    ARCHIVED: data.filter(x=>x.status==="ARCHIVED").length,
    ALL: data.length
  }

  const labels = {
    ACTIVE:"Aktiiviset",
    QUOTED:"Lähetetty",
    ORDERED:"Tilattu",
    ARCHIVED:"Arkisto",
    ALL:"Kaikki"
  }

  const el = document.getElementById("summary")
  el.innerHTML=""

  Object.keys(labels).forEach(k=>{
    const div=document.createElement("div")
    div.className="card"+(currentFilter===k?" active":"")
    div.innerHTML=`${labels[k]}<br><b>${counts[k]}</b>`
    div.onclick=()=>{currentFilter=k; applyFilters()}
    el.appendChild(div)
  })
}

// TABLE
function render() {
  const tbody = document.getElementById("rows")
  tbody.innerHTML=""

  const today = new Date()

  filtered.forEach(row=>{
    const expired = new Date(row.valid) < today && row.status==="QUOTED"

    const tr=document.createElement("tr")

    tr.onclick=()=>window.location="tarjous.html?id="+row.id

    tr.innerHTML=`
      <td>${row.number}</td>
      <td>${row.date}</td>
      <td>${row.customer}</td>
      <td>${row.delivery}</td>
      <td class="${expired?'expired':''}">${row.valid}</td>
      <td style="text-align:right">${row.total.toLocaleString()} €</td>
      <td onclick="event.stopPropagation()">
        <div class="status-wrap">
          <span class="badge ${row.status.toLowerCase()}" onclick="toggleMenu(${row.id})">
            ${row.status}
          </span>
          <div class="status-menu" id="menu-${row.id}">
            <div class="status-item" onclick="setStatus(${row.id},'DRAFT')">Luonnos</div>
            <div class="status-item" onclick="setStatus(${row.id},'QUOTED')">Lähetetty</div>
            <div class="status-item" onclick="setStatus(${row.id},'ORDERED')">Tilattu</div>
            <div class="status-item" onclick="setStatus(${row.id},'ARCHIVED')">Arkisto</div>
          </div>
        </div>
      </td>
      <td onclick="event.stopPropagation()">
        <button onclick="copy(${row.id})">Kopioi</button>
      </td>
    `

    tbody.appendChild(tr)
  })
}

// STATUS
function toggleMenu(id){
  document.querySelectorAll('.status-menu').forEach(m=>m.classList.remove('open'))
  document.getElementById("menu-"+id).classList.toggle("open")
}

function setStatus(id,status){
  const item=data.find(x=>x.id===id)
  item.status=status

  // TODO: Supabase update tähän

  applyFilters()
}

// FILTER + SEARCH
function search(q){
  filtered = data.filter(x=>
    x.customer.toLowerCase().includes(q.toLowerCase()) ||
    x.number.includes(q)
  )
  render()
}

function applyFilters(){
  if(currentFilter==="ALL") filtered=[...data]
  else if(currentFilter==="ACTIVE") filtered=data.filter(x=>x.status==="QUOTED"||x.status==="DRAFT")
  else filtered=data.filter(x=>x.status===currentFilter)

  renderSummary()
  render()
}

// SORT
function sort(key){
  filtered.sort((a,b)=>{
    if(a[key] > b[key]) return 1
    if(a[key] < b[key]) return -1
    return 0
  })
  render()
}

// ACTIONS
function copy(id){
  window.location = "tarjous.html?copy="+id
}

function newQuote(){
  window.location = "tarjous.html"
}

// CLOSE MENU
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".status-wrap")){
    document.querySelectorAll('.status-menu').forEach(m=>m.classList.remove('open'))
  }
})

// INIT
renderSummary()
render()

</script>

</body>
</html>
