<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjoukset — Okkosen Puutuote</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#1c1a14;
  --panel:#2a2720;
  --panel2:#2f2b23;
  --border:#4a4535;

  --accent:#3a6b7a;
  --accent-dim:#2d5561;
  --accent-glow:rgba(58,107,122,0.15);

  --text:#ededf0;
  --text-dim:#9595a0;

  --success:#3dba6e;
  --danger:#e84040;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans';
}

/* HEADER */
header{
  background:#111d20;
  border-bottom:2px solid var(--accent);
  padding:10px 24px;
  display:flex;
  align-items:center;
  gap:16px;
}

header img{height:36px}

.header-right{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:12px;
}

.nav a{
  color:var(--text-dim);
  text-decoration:none;
  font-family:'IBM Plex Mono';
  font-size:12px;
}

.nav a.current{
  color:var(--accent);
  font-weight:600;
}

.btn{
  background:var(--accent);
  border:none;
  padding:8px 12px;
  color:#fff;
  cursor:pointer;
  font-family:'IBM Plex Mono';
}

/* SUMMARY */
.summary{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:20px 24px;
}

.card{
  background:var(--panel2);
  border:1px solid var(--border);
  padding:12px;
  cursor:pointer;
}

.card.active{
  border-color:var(--accent);
  background:var(--accent-glow);
}

/* FILTER */
.filter{
  padding:0 24px 10px;
}

.filter input{
  width:260px;
  padding:6px;
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'IBM Plex Mono';
}

/* TABLE */
.table-wrap{
  margin:0 24px 24px;
  background:var(--panel);
  border:1px solid var(--border);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px 14px;
  border-bottom:1px solid var(--border);
}

th{
  font-family:'IBM Plex Mono';
  font-size:10px;
  color:var(--text-dim);
  cursor:pointer;
}

tr:hover{background:var(--accent-glow);cursor:pointer}

/* BADGE */
.badge{
  font-family:'IBM Plex Mono';
  font-size:10px;
  padding:2px 8px;
  cursor:pointer;
}

.draft{color:var(--text-dim)}
.quoted{color:var(--accent)}
.ordered{color:var(--success)}
.archived{color:#777}

/* STATUS MENU */
.status-wrap{position:relative}
.status-menu{
  position:absolute;
  top:120%;
  left:0;
  background:var(--panel2);
  border:1px solid var(--border);
  display:none;
  z-index:10;
}
.status-menu.open{display:block}

.status-item{
  padding:6px 10px;
  font-size:12px;
}
.status-item:hover{
  background:var(--accent-glow);
  color:var(--accent);
}

/* EXPIRED */
.expired{color:var(--danger);font-weight:600}

</style>
</head>

<body>

<header>
  <img src="okkonenlogopuu.svg">
  <div>Tarjoukset</div>

  <div class="header-right nav">
    <a href="asiakkaat.html">Asiakkaat</a>
    <a href="hinnasto.html">Hinnasto</a>
    <a href="tarjoukset.html" class="current">Tarjoukset</a>
    <a href="tarjous.html">Tarjous</a>
    <button class="btn" onclick="newQuote()">+ Uusi tarjous</button>
  </div>
</header>

<div class="summary" id="summary"></div>

<div class="filter">
  <input placeholder="Hae asiakas / tarjousnro..." oninput="search(this.value)">
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
  <th onclick="sort('quote_number')">Tarjousnro</th>
  <th onclick="sort('created_at')">Pvm</th>
  <th>Asiakas</th>
  <th>Toimitus</th>
  <th onclick="sort('valid_until')">Voimassa</th>
  <th onclick="sort('total_gross')">Summa €</th>
  <th>Status</th>
  <th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

<script>

// 🔌 SUPABASE
const supabase = window.supabase.createClient(
  "https://iofjnoxvksbaqorqaydh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZmpub3h2a3NiYXFvcnFheWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjYzNjcsImV4cCI6MjA5MTQwMjM2N30.7aYtakimbUHcxyv6Jco2ggt4VdS2F68xydTbi9suAPo"
)

let data = []
let filtered = []
let currentFilter="ALL"

// LOAD DATA
async function load(){
  const { data:rows } = await supabase
    .from("quotes")
    .select(`
      id, quote_number, created_at, valid_until,
      status, total_gross, delivery_type,
      customers(name)
    `)

  data = rows.map(r=>({
    ...r,
    customer: r.customers?.name || "-"
  }))

  applyFilters()
}

// SUMMARY
function renderSummary(){
  const counts={
    ACTIVE:data.filter(x=>x.status==="DRAFT"||x.status==="QUOTED").length,
    QUOTED:data.filter(x=>x.status==="QUOTED").length,
    ORDERED:data.filter(x=>x.status==="ORDERED").length,
    ARCHIVED:data.filter(x=>x.status==="ARCHIVED").length,
    ALL:data.length
  }

  const labels={
    ACTIVE:"Avoimet",
    QUOTED:"Lähetetty",
    ORDERED:"Tilattu",
    ARCHIVED:"Arkisto",
    ALL:"Kaikki"
  }

  const el=document.getElementById("summary")
  el.innerHTML=""

  Object.keys(labels).forEach(k=>{
    const d=document.createElement("div")
    d.className="card"+(currentFilter===k?" active":"")
    d.innerHTML=`${labels[k]}<br><b>${counts[k]}</b>`
    d.onclick=()=>{currentFilter=k;applyFilters()}
    el.appendChild(d)
  })
}

// TABLE
function render(){
  const tbody=document.getElementById("rows")
  tbody.innerHTML=""

  const today=new Date()

  filtered.forEach(row=>{
    const expired=new Date(row.valid_until)<today && row.status==="QUOTED"

    const tr=document.createElement("tr")
    tr.onclick=()=>location="tarjous.html?id="+row.id

    tr.innerHTML=`
      <td style="font-family:monospace">${row.quote_number}</td>
      <td>${row.created_at?.slice(0,10)}</td>
      <td>${row.customer}</td>
      <td>${row.delivery_type||""}</td>
      <td class="${expired?'expired':''}">${row.valid_until||""}</td>
      <td style="text-align:right">${(row.total_gross||0).toLocaleString()} €</td>

      <td onclick="event.stopPropagation()">
        <div class="status-wrap">
          <span class="badge ${row.status.toLowerCase()}" onclick="toggleMenu(${row.id})">${row.status}</span>
          <div class="status-menu" id="menu-${row.id}">
            <div class="status-item" onclick="setStatus(${row.id},'DRAFT')">Luonnos</div>
            <div class="status-item" onclick="setStatus(${row.id},'QUOTED')">Lähetetty</div>
            <div class="status-item" onclick="setStatus(${row.id},'ORDERED')">Tilattu</div>
            <div class="status-item" onclick="setStatus(${row.id},'ARCHIVED')">Arkisto</div>
          </div>
        </div>
      </td>

      <td onclick="event.stopPropagation()">
        <button onclick="copy(${row.id})">Kopioi</button>
      </td>
    `
    tbody.appendChild(tr)
  })
}

// STATUS UPDATE
async function setStatus(id,status){
  await supabase.from("quotes").update({status}).eq("id",id)

  const item=data.find(x=>x.id===id)
  item.status=status

  applyFilters()
}

function toggleMenu(id){
  document.querySelectorAll('.status-menu').forEach(m=>m.classList.remove('open'))
  document.getElementById("menu-"+id).classList.toggle("open")
}

// FILTER
function applyFilters(){
  if(currentFilter==="ALL") filtered=[...data]
  else if(currentFilter==="ACTIVE") filtered=data.filter(x=>x.status==="DRAFT"||x.status==="QUOTED")
  else filtered=data.filter(x=>x.status===currentFilter)

  renderSummary()
  render()
}

// SEARCH
function search(q){
  filtered=data.filter(x=>
    x.customer.toLowerCase().includes(q.toLowerCase()) ||
    x.quote_number.includes(q)
  )
  render()
}

// SORT
function sort(k){
  filtered.sort((a,b)=>a[k]>b[k]?1:-1)
  render()
}

// ACTIONS
function copy(id){
  location="tarjous.html?copy="+id
}
function newQuote(){
  location="tarjous.html"
}

// CLOSE MENU
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".status-wrap")){
    document.querySelectorAll('.status-menu').forEach(m=>m.classList.remove('open'))
  }
})

// INIT
load()

</script>

</body>
</html>
