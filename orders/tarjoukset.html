<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjoukset — Okkosen Puutuote</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #1c1a14;
    --panel: #2a2720;
    --panel2: #2f2b23;
    --border: #4a4535;
    --accent: #d97706;
    --accent-dim: #b45309;
    --accent-glow: rgba(217,119,6,0.13);
    --text: #ededf0;
    --text-dim: #9595a0;
    --input-bg: #333028;
    --success: #3dba6e;
    --danger: #e84040;
    --warn: #e8a020;
    --violet: #c084fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: #141210;
    border-bottom: 2px solid var(--accent);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  header img { height: 32px; }
  .header-title {
    font-size: 15px; font-weight: 500; color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* NAV DROPDOWN */
  .nav-menu-wrap { position: relative; }
  .nav-btn {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; letter-spacing: 0.04em;
  }
  .nav-btn:hover { background: var(--input-bg); border-color: var(--accent); }
  .nav-dropdown {
    display: none; position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 6px; min-width: 180px; z-index: 999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5); overflow: hidden;
  }
  .nav-dropdown.open { display: block; }
  .nav-item {
    display: block; padding: 9px 14px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--text); text-decoration: none; transition: background 0.1s;
  }
  .nav-item:hover { background: var(--accent-glow); color: var(--accent); }
  .nav-item.current { color: var(--accent); font-weight: 600; }
  .nav-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  /* BTN */
  .btn {
    background: var(--accent); border: none;
    color: #1c1a14; font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600; padding: 7px 14px;
    border-radius: 4px; cursor: pointer; letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent-dim); }

  /* PAGE */
  .page { padding: 20px 24px; max-width: 1400px; }

  /* SUMMARY CARDS */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .summary-card:hover { border-color: var(--accent); }
  .summary-card.active { border-color: var(--accent); background: var(--accent-glow); }
  .summary-card .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .summary-card .card-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px; font-weight: 600; line-height: 1;
  }
  .summary-card.active .card-number { color: var(--accent); }

  /* FILTER BAR */
  .filter-bar {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.06em; white-space: nowrap;
  }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .fbtn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; padding: 4px 10px; border-radius: 3px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .fbtn:hover { border-color: var(--accent); color: var(--text); }
  .fbtn.active { background: var(--accent); border-color: var(--accent); color: #1c1a14; font-weight: 600; }
  .fbtn.arch-btn.active { background: var(--text-dim); border-color: var(--text-dim); color: #1a1a1a; }
  .filter-search {
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; padding: 5px 10px; border-radius: 3px;
    width: 220px;
  }
  .filter-search:focus { outline: none; border-color: var(--accent); }
  .filter-search::placeholder { color: var(--text-dim); }

  /* TABLE */
  .table-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead tr { background: var(--panel2); }
  th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim);
    padding: 10px 14px; text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer; white-space: nowrap; user-select: none;
  }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  .sort-arrow { margin-left: 4px; opacity: 0.6; }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--accent-glow); }
  tbody tr td:first-child {
    border-left: 3px solid transparent;
    padding-left: 11px;
  }


  /* MOBIILIKORTTINÄKYMÄ */
  .quote-card-list { display: none; }

  @media (max-width: 640px) {
    .table-wrap table, .table-wrap thead, .table-wrap tbody { display: none; }
    .quote-card-list { display: block; padding: 4px; }
    .quote-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px 14px; margin-bottom: 8px;
      cursor: pointer; transition: background .1s;
    }
    .quote-card:active { background: var(--panel2); }
    .quote-card-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 8px; margin-bottom: 6px;
    }
    .quote-card-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
    .quote-card-sum {
      font-family: 'IBM Plex Mono', monospace; font-size: 15px;
      font-weight: 600; color: var(--accent); white-space: nowrap;
    }
    .quote-card-bottom {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; font-size: 11px;
    }
    .quote-card-meta { color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
    .quote-card-week { color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
    .summary-row { grid-template-columns: repeat(4, 1fr); }
    .table-footer { display: none; }
  }

  /* VÄLILEHDET */
  .tabs { display:flex; gap:4px; margin-bottom:16px; }
  .tab-btn {
    padding:8px 18px; border:1px solid var(--border); border-radius:4px 4px 0 0;
    background:var(--panel2); color:var(--text-dim);
    font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600;
    cursor:pointer; letter-spacing:.04em; transition:all .15s;
  }
  .tab-btn:hover { color:var(--text); border-color:var(--accent-dim); }
  .tab-btn.active { color:var(--accent); border-color:var(--accent); background:var(--accent-glow); }

  /* MALLIPOHJAT */
  .templates-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:14px; padding:4px;
  }
  .tpl-card {
    background:var(--panel); border:1px solid var(--border); border-radius:6px;
    padding:16px; display:flex; flex-direction:column; gap:10px; transition:border-color .15s;
  }
  .tpl-card:hover { border-color:var(--accent-dim); }
  .tpl-card-name { font-size:15px; font-weight:600; color:var(--text); }
  .tpl-card-meta { font-size:12px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; display:flex; flex-direction:column; gap:3px; }
  .tpl-card-price { font-size:18px; font-weight:600; color:var(--accent); font-family:'IBM Plex Mono',monospace; }
  .tpl-card-btn {
    margin-top:auto; padding:8px 14px; background:var(--accent); color:#141210;
    border:none; border-radius:4px; font-family:'IBM Plex Mono',monospace;
    font-size:12px; font-weight:700; cursor:pointer; letter-spacing:.04em;
  }
  .tpl-card-btn:hover { opacity:.85; }
  @media (max-width:640px) { .templates-grid { grid-template-columns:1fr; } }

  /* Row accent by status */
  tr.s-draft td:first-child    { border-left-color: var(--border); }
  tr.s-progress td:first-child { border-left-color: var(--warn); }
  tr.s-quoted td:first-child   { border-left-color: var(--violet); }
  tr.s-ordered td:first-child  { border-left-color: var(--success); }
  tr.s-archived td:first-child { border-left-color: #444; }
  tr.s-template td:first-child { border-left-color: var(--accent); }

  /* BADGES */
  .badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 3px;
    white-space: nowrap;
  }
  .badge-draft    { background: #2a2720; color: var(--text-dim); border: 1px solid var(--border); }
  .badge-progress { background: #2a1f0a; color: var(--warn); }
  .badge-quoted   { background: #22153a; color: var(--violet); }
  .badge-ordered  { background: #1a3028; color: var(--success); }
  .badge-archived { background: #222; color: #666; }
  .badge-template { background: #2a1f0e; color: var(--accent); border: 1px solid var(--accent-dim); }
  tr.s-completed td:first-child { border-left: 3px solid #22c55e; }
  .badge-completed { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }

  /* Status popup */
  .status-wrap { position: relative; display: inline-block; }
  .status-menu {
    display: none; position: absolute; top: calc(100% + 4px); left: 0;
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 5px; z-index: 50;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5); min-width: 130px; overflow: hidden;
  }
  .status-menu.open { display: block; }
  .status-item {
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    cursor: pointer; color: var(--text);
    transition: background 0.1s;
  }
  .status-item:hover { background: var(--accent-glow); color: var(--accent); }

  .mono { font-family: 'IBM Plex Mono', monospace; }
  .dim  { color: var(--text-dim); }
  .expired { color: var(--danger); font-weight: 600; }

  .copy-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; padding: 3px 8px; border-radius: 3px; cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .table-footer {
    padding: 8px 14px;
    display: flex; gap: 12px; align-items: center;
    border-top: 1px solid var(--border);
    background: var(--panel2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--text-dim);
  }

  .empty-state {
    text-align: center; padding: 48px 20px;
    color: var(--text-dim); font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <a href="index.html">
    <img src="okkonenlogopuu.svg" alt="Okkosen Puutuote">
  </a>

  <div class="nav-menu-wrap">
    <button class="nav-btn" onclick="toggleNav(event)">≡ Valikko</button>
    <div class="nav-dropdown" id="navDropdown">
      <a class="nav-item" href="asiakkaat.html">👤 Asiakkaat</a>
      <a class="nav-item" href="hinnasto.html">📦 Hinnasto</a>
      <hr class="nav-divider">

    </div>
  </div>

  <span class="header-title">Tarjoukset</span>

  <div class="header-right">
    <button class="btn" onclick="uusiTarjous()">+ Uusi tarjous</button>
  </div>
</header>

<div class="page">

  <!-- VÄLILEHDET -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-quotes" onclick="switchTab('quotes')">Tarjoukset</button>
    <button class="tab-btn" id="tab-templates" onclick="switchTab('templates')">Mallipohjat &nbsp;<span id="cnt-template" style="opacity:.6;font-size:10px;">—</span></button>
  </div>

  <!-- TARJOUKSET-NÄKYMÄ -->
  <div id="view-quotes">

  <!-- SUMMARY -->
  <div class="summary-row">
    <div class="summary-card active" id="card-active" onclick="setFilter('active')">
      <div class="card-label">Avoimet</div>
      <div class="card-number" id="cnt-active">—</div>
    </div>
    <div class="summary-card" id="card-in_progress" onclick="setFilter('in_progress')">
      <div class="card-label">Kesken</div>
      <div class="card-number" id="cnt-in_progress">—</div>
    </div>
    <div class="summary-card" id="card-quoted" onclick="setFilter('quoted')">
      <div class="card-label">Lähetetty</div>
      <div class="card-number" id="cnt-quoted">—</div>
    </div>
    <div class="summary-card" id="card-ordered" onclick="setFilter('ordered')">
      <div class="card-label">Tilattu</div>
      <div class="card-number" id="cnt-ordered">—</div>
    </div>
    <div class="summary-card" id="card-completed" onclick="setFilter('completed')">
      <div class="card-label">Valmis</div>
      <div class="card-number" id="cnt-completed">—</div>
    </div>
    <div class="summary-card" id="card-archived" onclick="setFilter('archived')">
      <div class="card-label">Arkisto</div>
      <div class="card-number" id="cnt-archived">—</div>
    </div>
    <div class="summary-card" id="card-all" onclick="setFilter('all')">
      <div class="card-label">Kaikki</div>
      <div class="card-number" id="cnt-all">—</div>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">STATUS</span>
    <div class="filter-btns">
      <button class="fbtn active" data-filter="active" onclick="setStatusBtn(this,'active')">Avoimet</button>
      <button class="fbtn" data-filter="draft" onclick="setStatusBtn(this,'draft')">Luonnos</button>
      <button class="fbtn" data-filter="in_progress" onclick="setStatusBtn(this,'in_progress')">Kesken</button>
      <button class="fbtn" data-filter="quoted" onclick="setStatusBtn(this,'quoted')">Lähetetty</button>
      <button class="fbtn" data-filter="ordered" onclick="setStatusBtn(this,'ordered')">Tilattu</button>
      <button class="fbtn" data-filter="completed" onclick="setStatusBtn(this,'completed')">Valmis</button>
      <button class="fbtn arch-btn" data-filter="archived" onclick="setStatusBtn(this,'archived')">Arkisto</button>
      <button class="fbtn" data-filter="all" onclick="setStatusBtn(this,'all')">Kaikki</button>
    </div>
    <input class="filter-search" id="searchInput" placeholder="Hae asiakas / tarjousnro..." oninput="applyFilters()">
  </div>

  </div><!-- /view-quotes -->

  <!-- MALLIPOHJAT-NÄKYMÄ -->
  <div id="view-templates" style="display:none;">
    <div class="templates-grid" id="templatesGrid">
      <div style="color:var(--text-dim);font-size:13px;padding:20px;">Ladataan...</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="quote-card-list" id="quoteCardList"></div>
  <div class="table-wrap" id="quotesTableWrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('quote_number')" id="th-quote_number">Tarjousnro <span class="sort-arrow" id="sa-quote_number"></span></th>
          <th onclick="sortBy('customer')" id="th-customer">Asiakas <span class="sort-arrow" id="sa-customer"></span></th>
          <th onclick="sortBy('created_at')" id="th-created_at">Päivämäärä <span class="sort-arrow" id="sa-created_at"></span></th>
          <th onclick="sortBy('valid_until')" id="th-valid_until">Voimassa <span class="sort-arrow" id="sa-valid_until"></span></th>
          <th onclick="sortBy('delivery_type')" id="th-delivery_type">Toimitus <span class="sort-arrow" id="sa-delivery_type"></span></th>
          <th onclick="sortBy('delivery_week')" id="th-delivery_week">Toimitusviikko <span class="sort-arrow" id="sa-delivery_week"></span></th>
          <th onclick="sortBy('total_gross')" id="th-total_gross" style="text-align:right">Summa € <span class="sort-arrow" id="sa-total_gross"></span></th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="quotesBody">
        <tr><td colspan="9" class="empty-state">Ladataan...</td></tr>
      </tbody>
    </table>
    <div class="table-footer">
      <span id="footerCount">—</span>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-guard.js"></script>
<script>
const SUPABASE_URL = 'https://iofjnoxvksbaqorqaydh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZmpub3h2a3NiYXFvcnFheWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjYzNjcsImV4cCI6MjA5MTQwMjM2N30.7aYtakimbUHcxyv6Jco2ggt4VdS2F68xydTbi9suAPo';

const STATUS_FI = {
  DRAFT:       'Luonnos',
  IN_PROGRESS: 'Kesken',
  QUOTED:      'Lähetetty',
  ORDERED:     'Tilattu',
  ARCHIVED:    'Arkisto',
  COMPLETED:   'Valmis'
};
const STATUS_CLASS = {
  DRAFT:       'draft',
  IN_PROGRESS: 'progress',
  QUOTED:      'quoted',
  ORDERED:     'ordered',
  ARCHIVED:    'archived',
  COMPLETED:   'completed'
};
const ACTIVE_STATUSES = ['DRAFT', 'IN_PROGRESS', 'QUOTED'];

let allQuotes = [];
let currentFilter = 'active';
let sortField = 'created_at';
let sortDir = 'desc';

async function loadQuotes() {
  const { data: { session } } = await window._supabaseClient.auth.getSession();
  const token = session ? session.access_token : SUPABASE_KEY;
  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/quotes?select=id,quote_number,created_at,valid_until,status,total_gross,delivery_type,delivery_week,is_template,template_name,customers(name)&order=created_at.desc`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` } }
  );
  const data = await r.json();
  allQuotes = (Array.isArray(data) ? data : []).map(q => ({
    ...q,
    customer: q.customers?.name || '—'
  }));
  updateCounts();
  applyFilters();
}


let currentTab = 'quotes';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-quotes').classList.toggle('active', tab === 'quotes');
  document.getElementById('tab-templates').classList.toggle('active', tab === 'templates');
  document.getElementById('view-quotes').style.display      = tab === 'quotes'    ? '' : 'none';
  document.getElementById('view-templates').style.display   = tab === 'templates' ? '' : 'none';
  document.getElementById('quotesTableWrap').style.display  = tab === 'quotes'    ? '' : 'none';
  if (tab === 'templates') renderTemplates();
}

const DELIVERY_FI = {
  hirsitoimitus:'Hirsitoimitus', puuosatoimitus:'Puuosatoimitus',
  valmistoimitus:'Valmistoimitus', nouto:'Nouto tehtaalta', toimitettu:'Toimitettu'
};

function renderTemplates() {
  const tpls = allQuotes.filter(q => q.is_template);
  const grid = document.getElementById('templatesGrid');
  if (!tpls.length) {
    grid.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:20px;grid-column:1/-1;">Ei mallipohjia vielä.</div>';
    return;
  }
  grid.innerHTML = tpls.map(t => {
    const hinta   = t.total_gross != null ? Number(t.total_gross).toLocaleString('fi-FI',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €' : '—';
    const toim    = DELIVERY_FI[t.delivery_type] || t.delivery_type || '—';
    const nimi    = t.template_name || (t.customers && t.customers.name) || 'Nimeämätön pohja';
    const asiakas = t.customers && t.customers.name ? '<span>Asiakas: ' + esc(t.customers.name) + '</span>' : '';
    return '<div class="tpl-card">'
      + '<div class="tpl-card-name">' + esc(nimi) + '</div>'
      + '<div class="tpl-card-meta"><span>Toimitus: ' + esc(toim) + '</span>' + asiakas + '</div>'
      + '<div class="tpl-card-price">' + hinta + '</div>'
      + '<button class="tpl-card-btn" onclick="copyTemplate(\'' + t.id + '\')">+ Kopioi uudeksi tarjoukseksi</button>'
      + '</div>';
  }).join('');
}

function copyTemplate(id) {
  window.location.href = 'tarjous.html?copy=' + id + '&keepPrices=1';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateCounts() {
  const active      = allQuotes.filter(q => !q.is_template && ACTIVE_STATUSES.includes(q.status)).length;
  const in_progress = allQuotes.filter(q => !q.is_template && q.status === 'IN_PROGRESS').length;
  const quoted      = allQuotes.filter(q => !q.is_template && q.status === 'QUOTED').length;
  const ordered     = allQuotes.filter(q => !q.is_template && q.status === 'ORDERED').length;
  const archived    = allQuotes.filter(q => !q.is_template && q.status === 'ARCHIVED').length;
  const template    = allQuotes.filter(q => q.is_template).length;
  document.getElementById('cnt-active').textContent      = active;
  document.getElementById('cnt-in_progress').textContent = in_progress;
  document.getElementById('cnt-quoted').textContent      = quoted;
  document.getElementById('cnt-ordered').textContent     = ordered;
  document.getElementById('cnt-completed').textContent   = allQuotes.filter(q => !q.is_template && q.status === 'COMPLETED').length;
  document.getElementById('cnt-archived').textContent    = archived;
  document.getElementById('cnt-template').textContent    = template;
  document.getElementById('cnt-all').textContent         = allQuotes.length;
  if (currentTab === 'templates') renderTemplates();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + f);
  if (card) card.classList.add('active');
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.fbtn[data-filter="${f}"]`);
  if (btn) btn.classList.add('active');
  applyFilters();
}

function setStatusBtn(btn, f) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + f);
  if (card) card.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let rows = allQuotes.filter(o => {
    if (currentFilter === 'template')    return o.is_template;
    if (currentFilter === 'active')      return !o.is_template && ACTIVE_STATUSES.includes(o.status);
    if (currentFilter === 'all')         return true;
    if (currentFilter === 'draft')       return !o.is_template && o.status === 'DRAFT';
    if (currentFilter === 'in_progress') return !o.is_template && o.status === 'IN_PROGRESS';
    if (currentFilter === 'quoted')      return !o.is_template && o.status === 'QUOTED';
    if (currentFilter === 'ordered')     return !o.is_template && o.status === 'ORDERED';
    if (currentFilter === 'completed')   return !o.is_template && o.status === 'COMPLETED';
    if (currentFilter === 'archived')    return !o.is_template && o.status === 'ARCHIVED';
    return true;
  });
  if (q) {
    rows = rows.filter(o =>
      o.customer.toLowerCase().includes(q) ||
      (o.quote_number || '').toLowerCase().includes(q) ||
      (o.delivery_type || '').toLowerCase().includes(q)
    );
  }
  rows.sort((a, b) => {
    let va = '', vb = '';
    if (sortField === 'customer')    { va = a.customer; vb = b.customer; }
    else if (sortField === 'total_gross') { va = a.total_gross || 0; vb = b.total_gross || 0; }
    else { va = a[sortField] || ''; vb = b[sortField] || ''; }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return sortDir === 'asc' ? cmp : -cmp;
  });
  renderTable(rows);
}

function sortBy(field) {
  if (sortField === field) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
  else { sortField = field; sortDir = field === 'created_at' ? 'desc' : 'asc'; }
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
  const arrow = document.getElementById('sa-' + field);
  const th    = document.getElementById('th-' + field);
  if (arrow) arrow.textContent = sortDir === 'asc' ? '↑' : '↓';
  if (th) th.classList.add('sorted');
  applyFilters();
}

function renderTable(rows) {
  const tbody = document.getElementById('quotesBody');
  document.getElementById('footerCount').textContent =
    rows.length === 0 ? 'Ei tarjouksia' : `${rows.length} tarjousta`;

  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Ei tarjouksia valituilla suodattimilla</td></tr>';
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);

  tbody.innerHTML = rows.map(q => {
    const isTmpl  = q.is_template;
    const cls     = isTmpl ? 'template' : (STATUS_CLASS[q.status] || 'draft');
    const fi      = isTmpl ? 'Malli' : (STATUS_FI[q.status] || q.status);
    const date    = (q.created_at || '').slice(0,10).split('-').reverse().join('.');
    const validDt = q.valid_until ? new Date(q.valid_until) : null;
    const expired = validDt && validDt < today && q.status === 'QUOTED' && !isTmpl;
    const validStr = q.valid_until ? q.valid_until.slice(0,10).split('-').reverse().join('.') : '—';
    const gross   = q.total_gross ? q.total_gross.toLocaleString('fi-FI', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
    // Mallilla näytetään template_name tarjousnumeron sijaan
    const nro     = isTmpl ? (q.template_name || '— malli —') : (q.quote_number || '—');

    return `<tr class="s-${cls}" onclick="avaaQuote('${q.id}')">
      <td class="mono" style="font-size:12px">${nro}</td>
      <td style="font-weight:500">${q.customer}</td>
      <td class="mono dim" style="font-size:12px">${date}</td>
      <td class="mono${expired?' expired':''}" style="font-size:12px">${isTmpl ? '—' : validStr}</td>
      <td class="dim" style="font-size:12px">${q.delivery_type || '—'}</td>
      <td class="mono" style="font-size:12px;color:var(--accent)">${(!isTmpl && q.delivery_week) ? q.delivery_week : '—'}</td>
      <td class="mono" style="text-align:right">${isTmpl ? '—' : gross}</td>
      <td onclick="event.stopPropagation()">
        <div class="status-wrap">
          <span class="badge badge-${cls}" onclick="toggleMenu('${q.id}',event)">${fi}</span>
          <div class="status-menu" id="menu-${q.id}">
            <div class="status-item" onclick="setStatus('${q.id}','DRAFT',false)">Luonnos</div>
            <div class="status-item" onclick="setStatus('${q.id}','IN_PROGRESS',false)">Kesken</div>
            <div class="status-item" onclick="setStatus('${q.id}','QUOTED',false)">Lähetetty</div>
            <div class="status-item" onclick="setStatus('${q.id}','ORDERED',false)">Tilattu</div>
            <div class="status-item" onclick="setStatus('${q.id}','COMPLETED',false)">Valmis</div>
            <div class="status-item" onclick="setStatus('${q.id}',null,true)">Malli</div>
            <div class="status-item" onclick="setStatus('${q.id}','ARCHIVED',false)">Arkisto</div>
          </div>
        </div>
      </td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap;display:flex;gap:6px;align-items:center;">
        <button class="copy-btn" onclick="kopioi('${q.id}')">⧉ Kopioi</button>
        <span class="dim">›</span>
      </td>
    </tr>`;
  }).join('');

  // Mobiilikorttinäkymä
  const cardList = document.getElementById('quoteCardList');
  cardList.innerHTML = rows.map(q => {
    const isTmpl = q.is_template;
    const cls    = isTmpl ? 'template' : (STATUS_CLASS[q.status] || 'draft');
    const fi     = isTmpl ? 'Malli' : (STATUS_FI[q.status] || q.status);
    const nimi   = isTmpl ? (q.template_name || '— malli —') : (q.customer || '—');
    const nro    = isTmpl ? '' : (q.quote_number || '');
    const gross  = q.total_gross ? Number(q.total_gross).toLocaleString('fi-FI',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €' : '—';
    const date   = (q.created_at||'').slice(0,10).split('-').reverse().join('.');
    const week   = (!isTmpl && q.delivery_week) ? q.delivery_week : '';
    return '<div class="quote-card" onclick="avaaQuote(\'' + q.id + '\')">'
      + '<div class="quote-card-top">'
      + '<div class="quote-card-name">' + esc(nimi) + '</div>'
      + '<div class="quote-card-sum">' + (isTmpl ? '—' : gross) + '</div>'
      + '</div>'
      + '<div class="quote-card-bottom">'
      + (nro ? '<span class="quote-card-meta">' + esc(nro) + '</span>' : '')
      + '<span class="quote-card-meta">' + date + '</span>'
      + (week ? '<span class="quote-card-week">vko ' + esc(week) + '</span>' : '')
      + '<span class="badge badge-' + cls + '" style="font-size:10px;">' + fi + '</span>'
      + '</div>'
      + '</div>';
  }).join('');
}

async function setStatus(id, status, isTemplate) {
  const body = isTemplate
    ? { is_template: true, status: 'DRAFT' }
    : { is_template: false, status };
  await fetch(`${SUPABASE_URL}/rest/v1/quotes?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json', Prefer: 'return=representation'
    },
    body: JSON.stringify(body)
  });
  const q = allQuotes.find(x => x.id === id);
  if (q) { q.is_template = isTemplate; if (!isTemplate) q.status = status; }
  updateCounts();
  applyFilters();
  document.querySelectorAll('.status-menu').forEach(m => m.classList.remove('open'));
}

function toggleMenu(id, e) {
  e.stopPropagation();
  const menu = document.getElementById('menu-' + id);
  const wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.status-menu').forEach(m => {
    m.classList.remove('open');
    m.style.top = '';
    m.style.bottom = '';
  });
  if (!wasOpen) {
    // Ensin näkyviin jotta getBoundingClientRect toimii
    menu.style.top = 'calc(100% + 4px)';
    menu.style.bottom = 'auto';
    menu.classList.add('open');
    // Nyt mitataan mahtuuko alas
    const rect = menu.getBoundingClientRect();
    if (rect.bottom > window.innerHeight - 8) {
      menu.style.top = 'auto';
      menu.style.bottom = 'calc(100% + 4px)';
    }
  }
}

function avaaQuote(id) {
  location.href = 'tarjous.html?id=' + id;
}

function kopioi(id) {
  location.href = 'tarjous.html?copy=' + id;
}

function uusiTarjous() {
  location.href = 'tarjous.html';
}

function toggleNav(e) {
  e.stopPropagation();
  document.getElementById('navDropdown').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.getElementById('navDropdown').classList.remove('open');
  document.querySelectorAll('.status-menu').forEach(m => m.classList.remove('open'));
});

// Mark sorted column initially
document.getElementById('sa-created_at').textContent = '↓';
document.getElementById('th-created_at').classList.add('sorted');

loadQuotes();
</script>
