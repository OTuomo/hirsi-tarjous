<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muistilista — Okkosen Puutuote</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-guard.js"></script>
<style>
:root{--bg:#faf7f2;--bg2:#f3ede4;--bg3:#ede4d8;--panel:#ffffff;--border:#e0d4c4;--border2:#cfc0ac;--accent:#d97706;--accent-dim:#b45309;--accent-bg:rgba(217,119,6,0.10);--text:#2a1f14;--text-mid:#6b4f38;--text-dim:#a08878;--shadow:0 1px 4px rgba(100,60,20,0.08);--radius:6px;--red:#dc2626;--yellow:#d97706;--green:#16a34a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;}
header{background:var(--panel);border-bottom:2px solid var(--accent);padding:10px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
header .logo{height:32px;width:auto;}
.nav-menu-wrap{position:relative;}
.nav-btn{background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;padding:6px 12px;border-radius:4px;cursor:pointer;letter-spacing:.04em;}
.nav-btn:hover{background:var(--bg3);}
.nav-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--panel);border:1px solid var(--border2);border-radius:var(--radius);min-width:200px;z-index:999;box-shadow:0 4px 16px rgba(100,60,20,0.15);overflow:hidden;}
.nav-dropdown.open{display:block;}
.nav-section-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:8px 14px 4px;}
.nav-item{display:block;padding:8px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);text-decoration:none;transition:background .1s;}
.nav-item:hover{background:var(--accent-bg);color:var(--accent);}
.nav-item.current{color:var(--accent);font-weight:600;}
header h1{font-size:16px;font-weight:500;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--panel);color:var(--text-mid);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.03em;white-space:nowrap;}
.btn:hover{background:var(--bg2);color:var(--text);border-color:var(--accent);}
.btn-accent{background:var(--accent);color:white;border-color:var(--accent);}
.btn-accent:hover{background:var(--accent-dim);border-color:var(--accent-dim);color:white;}
.btn-sm{padding:4px 10px;font-size:11px;}
.page{max-width:1100px;margin:0 auto;padding:24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.page-header h2{font-size:20px;font-weight:600;}
.show-done-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);cursor:pointer;}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);}
.tab-btn{padding:8px 16px;border:none;background:none;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;letter-spacing:.04em;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.col-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-mid);}
.col-title.shared{color:var(--accent);}
.todo-list{display:flex;flex-direction:column;gap:8px;min-height:40px;}
.todo-item{background:var(--panel);border:1px solid var(--border);border-left:4px solid var(--border2);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);transition:opacity .2s;}
.todo-item.done{opacity:.45;}
.todo-item.priority-high{border-left-color:var(--red);}
.todo-item.priority-normal{border-left-color:var(--yellow);}
.todo-item.priority-low{border-left-color:var(--green);}
.todo-check{width:18px;height:18px;flex-shrink:0;margin-top:2px;cursor:pointer;accent-color:var(--accent);}
.todo-body{flex:1;min-width:0;}
.todo-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;}
.todo-item.done .todo-title{text-decoration:line-through;color:var(--text-dim);}
.todo-notes{font-size:12px;color:var(--text-dim);margin-top:2px;}
.todo-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.todo-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);}
.todo-date.overdue{color:var(--red);font-weight:600;}
.badge-priority{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:1px 6px;border-radius:99px;font-weight:600;}
.badge-high{background:rgba(220,38,38,.12);color:var(--red);}
.badge-normal{background:rgba(217,119,6,.12);color:var(--yellow);}
.badge-low{background:rgba(22,163,74,.12);color:var(--green);}
.todo-del{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:16px;padding:2px 6px;border-radius:3px;flex-shrink:0;transition:color .1s;line-height:1;}
.todo-del:hover{color:var(--red);}
.todo-edit{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:15px;padding:2px 6px;border-radius:3px;flex-shrink:0;transition:color .1s;line-height:1;}
.todo-edit:hover{color:var(--yellow);}
.todo-empty{text-align:center;padding:32px 16px;color:var(--text-dim);font-size:13px;border:2px dashed var(--border);border-radius:var(--radius);}
.checklist-panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;}
.checklist-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.checklist-header-title{font-weight:600;font-size:14px;flex:1;}
.checklist-progress{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);}
.checklist-body{padding:8px 0;}
.checklist-item{display:flex;align-items:center;gap:10px;padding:7px 14px;transition:background .1s;}
.checklist-item:hover{background:var(--bg2);}
.checklist-item.done .checklist-item-text{text-decoration:line-through;color:var(--text-dim);}
.checklist-item-text{flex:1;font-size:13px;}
.checklist-item-del{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:12px;padding:2px 6px;opacity:0;transition:opacity .1s;}
.checklist-item:hover .checklist-item-del{opacity:1;}
.checklist-item-del:hover{color:var(--red);}
.checklist-add{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--border);}
.checklist-add input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;}
.checklist-add input:focus{border-color:var(--accent);}
.new-checklist-btn{width:100%;margin-bottom:12px;padding:10px;border:2px dashed var(--border2);border-radius:var(--radius);background:none;color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;}
.new-checklist-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:200;align-items:center;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:28px;width:460px;max-width:96vw;box-shadow:0 8px 32px rgba(100,60,20,0.15);}
.modal h2{font-size:16px;font-weight:600;margin-bottom:18px;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
label{font-size:11px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace;}
input[type=text],input[type=date],input[type=time],select,textarea{background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:4px;padding:7px 11px;font-family:inherit;font-size:13px;outline:none;transition:border-color .15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--panel);}
.shared-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-mid);cursor:pointer;margin-top:4px;}
.shared-toggle input{width:auto;accent-color:var(--accent);}
.form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
#toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--text);z-index:999;display:none;box-shadow:var(--shadow);}
#toast.success{border-color:#22c55e;color:#15803d;}
#toast.error{border-color:#ef4444;color:#dc2626;}
@media(max-width:640px){.page{padding:16px;}.columns{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <img src="okkonenlogopuu.svg" alt="Okkosen Puutuote" class="logo">
  <div class="nav-menu-wrap">
    <button class="nav-btn" onclick="toggleNav(event)">&#9776; Valikko</button>
    <div class="nav-dropdown" id="navDropdown">
      <div class="nav-section-label">Sivut</div>
      <a class="nav-item" href="asiakkaat.html">Asiakkaat</a>
      <a class="nav-item" href="hinnasto.html">Hinnasto</a>
      <a class="nav-item" href="tarjoukset.html">Tarjoukset</a>
      <a class="nav-item" href="tarjous.html">Uusi tarjous</a>
      <a class="nav-item" href="kalenteri.html">Kalenteri</a>
      <a class="nav-item current" href="todo.html">Muistilista</a>
    </div>
  </div>
  <h1>Muistilista</h1>
  <div class="header-right">
    <label class="show-done-wrap">
      <input type="checkbox" id="showDone" onchange="renderAll()" style="accent-color:var(--accent);width:auto;">
      Nayta tehdyt
    </label>
  </div>
</header>
<div class="page">
  <div class="page-header"><h2>Muistilista ja tehtavat</h2></div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-todos" onclick="switchTab('todos')">Tehtavat</button>
    <button class="tab-btn" id="tab-lists" onclick="switchTab('lists')">Listat</button>
  </div>
  <div id="view-todos">
    <div class="columns">
      <div>
        <div class="col-header">
          <span class="col-title">Omat</span>
          <button class="btn btn-sm btn-accent" onclick="openModal(false)">+ Lisaa</button>
        </div>
        <div class="todo-list" id="listOmat"></div>
      </div>
      <div>
        <div class="col-header">
          <span class="col-title shared">Yhteiset</span>
          <button class="btn btn-sm btn-accent" onclick="openModal(true)">+ Lisaa</button>
        </div>
        <div class="todo-list" id="listYhteiset"></div>
      </div>
    </div>
  </div>
  <div id="view-lists" style="display:none;">
    <div class="columns">
      <div>
        <div class="col-header"><span class="col-title">Omat listat</span></div>
        <button class="new-checklist-btn" onclick="openNewListModal(false)">+ Uusi lista</button>
        <div id="omatListat"></div>
      </div>
      <div>
        <div class="col-header"><span class="col-title shared">Yhteiset listat</span></div>
        <button class="new-checklist-btn" onclick="openNewListModal(true)">+ Uusi lista</button>
        <div id="yhteisListat"></div>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="todoModal">
  <div class="modal">
    <h2 id="modalTitle">Uusi tehtava</h2>
    <div class="form-group"><label>Tehtava *</label><input type="text" id="fTitle" placeholder="esim. Soita Jormalle"></div>
    <div class="form-group"><label>Lisatiedot</label><textarea id="fNotes" rows="2" placeholder="Vapaaehtoinen..."></textarea></div>
    <div class="form-row-3">
      <div class="form-group"><label>Paivamaara</label><input type="date" id="fDate"></div>
      <div class="form-group"><label>Kellonaika</label><input type="time" id="fTime"></div>
      <div class="form-group"><label>Tarkeys</label>
        <select id="fPriority"><option value="high">Kiireellinen</option><option value="normal" selected>Normaali</option><option value="low">Ei kiireellinen</option></select>
      </div>
    </div>
    <label class="shared-toggle"><input type="checkbox" id="fShared"> Nakyy kaikille</label>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Peruuta</button>
      <button class="btn btn-accent" onclick="saveTodo()">Tallenna</button>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="listModal">
  <div class="modal">
    <h2>Uusi lista</h2>
    <div class="form-group"><label>Listan nimi *</label><input type="text" id="fListName" placeholder="esim. Ostoslista"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeListModal()">Peruuta</button>
      <button class="btn btn-accent" onclick="saveNewList()">Luo lista</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
var SURL = "https://iofjnoxvksbaqorqaydh.supabase.co";
var SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZmpub3h2a3NiYXFvcnFheWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjYzNjcsImV4cCI6MjA5MTQwMjM2N30.7aYtakimbUHcxyv6Jco2ggt4VdS2F68xydTbi9suAPo";
var scl = supabase.createClient(SURL, SKEY);
var todos = [];
var checklists = [];
var currentUserId = null;
var newListShared = false;
var currentEditId = null;

function toggleNav(e) {
  e.stopPropagation();
  document.getElementById("navDropdown").classList.toggle("open");
}
document.addEventListener("click", function() {
  document.getElementById("navDropdown").classList.remove("open");
});

function switchTab(tab) {
  document.getElementById("tab-todos").classList.toggle("active", tab === "todos");
  document.getElementById("tab-lists").classList.toggle("active", tab === "lists");
  document.getElementById("view-todos").style.display = tab === "todos" ? "" : "none";
  document.getElementById("view-lists").style.display = tab === "lists" ? "" : "none";
}

async function init() {
  var s = await scl.auth.getSession();
  currentUserId = (s.data && s.data.session) ? s.data.session.user.id : null;
  await loadTodos();
  await loadChecklists();
  renderAll();
}

async function loadTodos() {
  var r = await scl.from("todos").select("*").order("is_done").order("created_at");
  if (r.error) { showToast("Virhe: " + r.error.message, "error"); return; }
  todos = r.data || [];
}

function renderAll() {
  var showDone = document.getElementById("showDone").checked;
  var today = new Date().toISOString().slice(0, 10);
  var omat = todos.filter(function(t) { return !t.is_shared && t.user_id === currentUserId && (showDone || !t.is_done); });
  var yhteiset = todos.filter(function(t) { return t.is_shared && (showDone || !t.is_done); });
  buildList(document.getElementById("listOmat"), omat, today);
  buildList(document.getElementById("listYhteiset"), yhteiset, today);
}

var PLABEL = { high: "Kiireellinen", normal: "Normaali", low: "Ei kiireellinen" };

function buildList(container, items, today) {
  container.innerHTML = "";
  if (!items.length) {
    var empty = document.createElement("div");
    empty.className = "todo-empty";
    empty.textContent = "Ei tehtavia";
    container.appendChild(empty);
    return;
  }
  items.forEach(function(t) {
    var p = t.priority || "normal";
    var isOverdue = !t.is_done && t.due_date && t.due_date < today;
    var div = document.createElement("div");
    div.className = "todo-item priority-" + p + (t.is_done ? " done" : "");
    var cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "todo-check";
    cb.checked = !!t.is_done;
    cb.addEventListener("change", function() { toggleDone(t.id, this.checked); });
    var body = document.createElement("div");
    body.className = "todo-body";
    var title = document.createElement("div");
    title.className = "todo-title";
    title.textContent = t.title;
    body.appendChild(title);
    if (t.notes) {
      var notes = document.createElement("div");
      notes.className = "todo-notes";
      notes.textContent = t.notes;
      body.appendChild(notes);
    }
    var meta = document.createElement("div");
    meta.className = "todo-meta";
    if (t.due_date) {
      var dateStr = t.due_date.split("-").reverse().join(".");
      var timeStr = t.due_time ? " klo " + t.due_time.slice(0,5) : "";
      var dateEl = document.createElement("span");
      dateEl.className = "todo-date" + (isOverdue ? " overdue" : "");
      dateEl.textContent = (isOverdue ? "! " : "") + dateStr + timeStr;
      meta.appendChild(dateEl);
    }
    var badge = document.createElement("span");
    badge.className = "badge-priority badge-" + p;
    badge.textContent = PLABEL[p];
    meta.appendChild(badge);
    body.appendChild(meta);
    var del = document.createElement("button");
    del.className = "todo-del";
    del.textContent = "X";
    del.title = "Poista";
    del.addEventListener("click", function() { deleteTodo(t.id); });
    var edit = document.createElement("button");
    edit.className = "todo-edit";
    edit.textContent = "✎";
    edit.title = "Muokkaa";
    edit.addEventListener("click", function() { openModal(t.is_shared, t); });
    div.appendChild(cb);
    div.appendChild(body);
    div.appendChild(edit);
    div.appendChild(del);
    container.appendChild(div);
  });
}

async function toggleDone(id, done) {
  await scl.from("todos").update({ is_done: done, done_at: done ? new Date().toISOString() : null }).eq("id", id);
  var t = todos.find(function(x) { return x.id === id; });
  if (t) t.is_done = done;
  renderAll();
}

async function deleteTodo(id) {
  if (!confirm("Poistetaanko tehtava?")) return;
  await scl.from("todos").delete().eq("id", id);
  todos = todos.filter(function(t) { return t.id !== id; });
  renderAll();
  showToast("Poistettu", "success");
}

function openModal(shared, todo) {
  currentEditId = todo ? todo.id : null;
  document.getElementById("modalTitle").textContent = todo ? "Muokkaa tehtavaa" : (shared ? "Uusi yhteinen tehtava" : "Uusi oma tehtava");
  document.getElementById("fTitle").value = todo ? todo.title : "";
  document.getElementById("fNotes").value = todo ? (todo.notes || "") : "";
  document.getElementById("fDate").value = todo ? (todo.due_date || "") : "";
  document.getElementById("fTime").value = todo ? (todo.due_time ? todo.due_time.slice(0,5) : "") : "";
  document.getElementById("fPriority").value = todo ? (todo.priority || "normal") : "normal";
  document.getElementById("fShared").checked = todo ? !!todo.is_shared : shared;
  document.getElementById("todoModal").classList.add("open");
  setTimeout(function() { document.getElementById("fTitle").focus(); }, 100);
}
function closeModal() { document.getElementById("todoModal").classList.remove("open"); }
document.getElementById("todoModal").addEventListener("click", function(e) {
  if (e.target === document.getElementById("todoModal")) closeModal();
});
document.getElementById("fTitle").addEventListener("keydown", function(e) {
  if (e.key === "Enter") saveTodo();
});

async function saveTodo() {
  var title = document.getElementById("fTitle").value.trim();
  if (!title) { showToast("Kirjoita tehtava", "error"); return; }
  var due_date = document.getElementById("fDate").value || null;
  var due_time = document.getElementById("fTime").value || null;
  var payload = {
    title: title,
    notes: document.getElementById("fNotes").value.trim() || null,
    due_date: due_date,
    due_time: due_time,
    due_week: due_date ? getWeekKey(new Date(due_date)) : null,
    priority: document.getElementById("fPriority").value,
    is_shared: document.getElementById("fShared").checked,
  };
  if (currentEditId) {
    var r = await scl.from("todos").update(payload).eq("id", currentEditId).select();
    if (r.error) { showToast("Virhe: " + r.error.message, "error"); return; }
    var idx = todos.findIndex(function(t) { return t.id === currentEditId; });
    if (idx !== -1) todos[idx] = Object.assign(todos[idx], r.data[0]);
    showToast("Tallennettu!", "success");
  } else {
    payload.user_id = currentUserId;
    payload.is_done = false;
    var r = await scl.from("todos").insert([payload]).select();
    if (r.error) { showToast("Virhe: " + r.error.message, "error"); return; }
    todos.unshift(r.data[0]);
    showToast("Lisatty!", "success");
  }
  renderAll();
  closeModal();
}

async function loadChecklists() {
  var r = await scl.from("checklists")
    .select("*, checklist_items(*)")
    .order("created_at");
  if (r.error) { showToast("Virhe listojen latauksessa", "error"); return; }
  checklists = (r.data || []).map(function(l) {
    return {
      id: l.id,
      name: l.name,
      is_shared: l.is_shared,
      user_id: l.user_id,
      items: (l.checklist_items || []).sort(function(a,b){ return a.sort_order - b.sort_order; }).map(function(i) {
        return { id: i.id, text: i.text, done: i.is_done };
      })
    };
  });
  renderChecklists();
}

function renderChecklists() {
  buildCLGroup("omatListat", checklists.filter(function(l) { return !l.is_shared; }));
  buildCLGroup("yhteisListat", checklists.filter(function(l) { return l.is_shared; }));
}

function buildCLGroup(cid, lists) {
  var container = document.getElementById(cid);
  container.innerHTML = "";
  lists.forEach(function(list) {
    var done = list.items.filter(function(i) { return i.done; }).length;
    var total = list.items.length;
    var panel = document.createElement("div");
    panel.className = "checklist-panel";
    var hdr = document.createElement("div");
    hdr.className = "checklist-header";
    hdr.addEventListener("click", function() { toggleCL(list.id); });
    var htitle = document.createElement("span");
    htitle.className = "checklist-header-title";
    htitle.textContent = list.name;
    var hprog = document.createElement("span");
    hprog.className = "checklist-progress";
    hprog.textContent = done + "/" + total;
    var hdel = document.createElement("button");
    hdel.textContent = "X";
    hdel.style.cssText = "background:none;border:none;cursor:pointer;color:var(--text-dim);margin-left:8px;";
    hdel.addEventListener("click", function(e) { e.stopPropagation(); deleteCL(list.id); });
    hdr.appendChild(htitle);
    hdr.appendChild(hprog);
    hdr.appendChild(hdel);
    var body = document.createElement("div");
    body.className = "checklist-body";
    body.id = "cl-" + list.id;
    list.items.forEach(function(item) {
      var row = document.createElement("div");
      row.className = "checklist-item" + (item.done ? " done" : "");
      var icb = document.createElement("input");
      icb.type = "checkbox";
      icb.style.cssText = "accent-color:var(--accent);width:auto;cursor:pointer;";
      icb.checked = !!item.done;
      icb.addEventListener("change", function() { toggleCI(list.id, item.id, this.checked); });
      var itext = document.createElement("span");
      itext.className = "checklist-item-text";
      itext.textContent = item.text;
      var idel = document.createElement("button");
      idel.className = "checklist-item-del";
      idel.textContent = "x";
      idel.addEventListener("click", function() { deleteCI(list.id, item.id); });
      row.appendChild(icb);
      row.appendChild(itext);
      row.appendChild(idel);
      body.appendChild(row);
    });
    var addRow = document.createElement("div");
    addRow.className = "checklist-add";
    var addInput = document.createElement("input");
    addInput.type = "text";
    addInput.id = "cli-" + list.id;
    addInput.placeholder = "Lisaa kohta...";
    addInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") addCI(list.id);
    });
    var addBtn = document.createElement("button");
    addBtn.className = "btn btn-sm btn-accent";
    addBtn.textContent = "+";
    addBtn.addEventListener("click", function() { addCI(list.id); });
    addRow.appendChild(addInput);
    addRow.appendChild(addBtn);
    body.appendChild(addRow);
    panel.appendChild(hdr);
    panel.appendChild(body);
    container.appendChild(panel);
  });
}

function toggleCL(id) {
  var b = document.getElementById("cl-" + id);
  if (b) b.style.display = b.style.display === "none" ? "" : "none";
}
async function toggleCI(lid, iid, done) {
  await scl.from("checklist_items").update({ is_done: done }).eq("id", iid);
  var l = checklists.find(function(x) { return x.id === lid; });
  if (l) { var i = l.items.find(function(x) { return x.id === iid; }); if (i) i.done = done; }
  renderChecklists();
}
async function addCI(lid) {
  var inp = document.getElementById("cli-" + lid);
  var text = inp ? inp.value.trim() : "";
  if (!text) return;
  var l = checklists.find(function(x) { return x.id === lid; });
  if (!l) return;
  var order = l.items.length;
  var r = await scl.from("checklist_items").insert([{
    checklist_id: lid, text: text, is_done: false, sort_order: order
  }]).select();
  if (r.error) { showToast("Virhe: " + r.error.message, "error"); return; }
  l.items.push({ id: r.data[0].id, text: text, done: false });
  renderChecklists();
  setTimeout(function() { var n = document.getElementById("cli-" + lid); if (n) n.focus(); }, 50);
}
async function deleteCI(lid, iid) {
  await scl.from("checklist_items").delete().eq("id", iid);
  var l = checklists.find(function(x) { return x.id === lid; });
  if (l) l.items = l.items.filter(function(i) { return i.id !== iid; });
  renderChecklists();
}
async function deleteCL(id) {
  if (!confirm("Poistetaanko lista?")) return;
  await scl.from("checklists").delete().eq("id", id);
  checklists = checklists.filter(function(l) { return l.id !== id; });
  renderChecklists();
  showToast("Lista poistettu", "success");
}

function openNewListModal(shared) {
  newListShared = shared;
  document.getElementById("fListName").value = "";
  document.getElementById("listModal").classList.add("open");
  setTimeout(function() { document.getElementById("fListName").focus(); }, 100);
}
function closeListModal() { document.getElementById("listModal").classList.remove("open"); }
document.getElementById("listModal").addEventListener("click", function(e) {
  if (e.target === document.getElementById("listModal")) closeListModal();
});
document.getElementById("fListName").addEventListener("keydown", function(e) {
  if (e.key === "Enter") saveNewList();
});
async function saveNewList() {
  var name = document.getElementById("fListName").value.trim();
  if (!name) { showToast("Anna nimi", "error"); return; }
  var r = await scl.from("checklists").insert([{
    name: name, is_shared: newListShared, user_id: currentUserId
  }]).select();
  if (r.error) { showToast("Virhe: " + r.error.message, "error"); return; }
  checklists.push({ id: r.data[0].id, name: name, is_shared: newListShared, user_id: currentUserId, items: [] });
  renderChecklists(); closeListModal();
  showToast("Lista luotu!", "success");
}

function getWeekKey(date) {
  var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  var dn = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dn);
  var ys = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  var wk = Math.ceil((((d - ys) / 86400000) + 1) / 7);
  return d.getUTCFullYear() + "-" + String(wk).padStart(2, "0");
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
var toastTimer;
function showToast(msg, type) {
  clearTimeout(toastTimer);
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = type || ""; t.style.display = "block";
  toastTimer = setTimeout(function() { t.style.display = "none"; }, 3000);
}
init();
</script>
